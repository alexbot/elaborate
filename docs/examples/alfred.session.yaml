    - id: stakeholder-elaboration-stakeholder_001-0-composition-r0
      value:
        question: What would **elderly people** need from this system to feel more
          confident doing everyday activities alone?
        suggestions:
          - Knowing that someone would be alerted if I fell or had a medical
            emergency, so I could take walks without worrying
          - Being able to understand what my health data means without having to
            ask my kids or doctor every time
          - A way to manage my medications that doesn't feel complicated or make
            me feel like I'm being watched
    - id: stakeholder-elaboration-stakeholder_001-0-question-r0
      value: >-
        All three matter, but (a) is the foundation. If they don't trust the
        emergency detection, nothing else works — they stay anxious and
        homebound.


        But (b) and (c) are what actually *use* that safety net. (b) is about
        understanding their own data so they're not dependent on family to
        interpret. (c) is the thing people don't always say out loud: medication
        reminders can feel infantilizing. "Your system is telling me when to
        take my pills" feels like loss of control, even if it's technically
        helpful. We need to frame it as *support*, not surveillance.


        The hard part is that these three pull in different directions
        sometimes. Making medication management feel non-intrusive means fewer
        notifications. But fewer notifications might mean they miss doses. So we
        have to be smart about *when* and *how* we remind, not whether.
    - id: stakeholder-elaboration-stakeholder_001-0-extraction-r0
      value:
        responseInterpretation: "All three suggestions matter for elderly people's
          independence, but emergency detection is foundational — without trust
          in fall and medical emergency alerts, elderly people remain anxious
          and homebound. Health data understanding (being able to interpret
          their own data without depending on family to explain it) and
          medication management support are what enable them to actually use
          that safety net. Medication reminders can feel infantilizing and like
          loss of control even when technically helpful, so the system must
          frame reminders as support, not surveillance. The three needs create
          design tensions: making medication management feel non-intrusive means
          fewer notifications, but fewer notifications might mean they miss
          doses, so the system must be smart about when and how it reminds, not
          whether to remind."
        role: null
        concerns:
          - Anxiety about falls or medical emergencies when alone
          - Dependency on family members to interpret health data
          - Medication reminders feeling infantilizing or surveillance-like
          - Loss of control when system manages medication reminders
        contradictions: []
        waitingRoomItems:
          - content: "Design tension: fewer notifications make medication management feel
              non-intrusive but increase risk of missed doses; system must
              balance notification frequency against user experience"
        responseClass: answer
    - id: stakeholder-followup-assessment-stakeholder_001
      value:
        needed: false
    - id: stakeholder-elaboration-stakeholder_002-0-composition-r0
      value:
        question: What **daily activities** would users with varying tech literacy feel
          most confident doing alone if they knew the system had their back?
        suggestions:
          - Walking outside or running errands without worrying about falls or
            medical episodes
          - Managing medications independently without family having to check in
            or remind them
          - Staying home longer instead of moving to assisted living because
            everyday risks feel manageable
    - id: stakeholder-elaboration-stakeholder_002-0-question-r0
      value: >-
        (a) is the obvious one — people want to move around, get outside, do
        their own errands instead of waiting for someone to drive them. That's
        independence.


        But (b) is where tech literacy actually matters. Someone comfortable
        with phones might set their own reminders; someone who isn't needs the
        system to do it reliably. The variance is huge. We can't assume anything
        about their baseline comfort.


        (c) is the outcome, not the activity — but yes, that's what we're after.


        What I'd add: **staying socially connected** without depending on family
        to facilitate it. Right now, isolated elderly people either sit home or
        rely on kids to arrange visits, calls, activities. If they could video
        call a friend, join a virtual group, get reminders about community
        events — that's independence too. Not just physical safety, but staying
        engaged.
    - id: stakeholder-elaboration-stakeholder_002-0-extraction-r0
      value:
        responseInterpretation: "The respondent affirmed (a) walking outside and running
          errands as the obvious independence outcome. For (b) medication
          management, they emphasized that tech literacy variance is huge — some
          users can set reminders independently, others need the system to do it
          reliably. They noted (c) is the outcome, not the activity, but
          confirmed it's the goal. They added a fourth activity: staying
          socially connected without depending on family to facilitate it —
          users should be able to video call friends, join virtual groups, and
          get reminders about community events independently."
        role: null
        concerns:
          - Tech literacy variance is huge — cannot assume baseline comfort with
            phones or digital interfaces
          - Medication reminders need to be reliable for users uncomfortable
            with technology, or they'll skip medication
          - Isolated elderly people currently depend on family to arrange social
            contact, visits, calls, activities
          - Need for independence in social engagement, not just physical safety
        contradictions: []
        waitingRoomItems:
          - content: Users should be able to video call friends independently
          - content: Users should be able to join virtual groups independently
          - content: System should send reminders about community events
        responseClass: answer
    - id: stakeholder-followup-assessment-stakeholder_002
      value:
        needed: false
        question: null
        suggestions: null
    - id: stakeholder-elaboration-stakeholder_003-0-composition-r0
      value:
        question: What would **family caregivers** need to see or do differently if this
          system worked well for your relative?
        suggestions:
          - Less frequent check-in calls or visits because I'd have confidence
            they're managing safely
          - Clear alerts when something actually needs my attention, instead of
            trying to interpret health data myself
          - My relative doing things independently that they currently ask me to
            help with or coordinate
    - id: stakeholder-elaboration-stakeholder_003-0-question-r0
      value: >-
        All three, but with a caveat.


        (a) is what family *wants*, but there's a trust issue baked in. They
        won't actually reduce check-ins unless they believe the system will
        catch real problems. So the alerts in (b) have to be trustworthy — not
        too many false alarms, not missing the actual emergencies. If the system
        cries wolf, family stops trusting it and goes back to daily calls.


        (c) is the outcome of the system working. But here's the tension: family
        often *likes* being needed. They might say they want their relative
        independent, but when the person stops asking for help, it can feel like
        loss of role or connection. We need to reframe it — less logistical
        help, more actual relationship time.


        And I'd add something you didn't list: **control over what they can
        see**. Family shouldn't have blanket access to everything. The elderly
        person should decide what gets shared — maybe medication adherence but
        not bathroom visits, or fall alerts but not social activity. Privacy
        matters even within families. That's a feature, not a bug.
    - id: stakeholder-elaboration-stakeholder_003-0-extraction-r0
      value:
        responseInterpretation: "Family caregivers want all three outcomes: fewer
          check-ins due to confidence in the system, clear alerts that are
          trustworthy (not false alarms that erode trust), and their relative
          doing things independently. However, there's a psychological
          dimension: family members won't actually reduce check-ins unless they
          believe the system catches real problems reliably. There's also a
          tension around independence itself — family members may say they want
          their relative to be independent, but when that happens they may
          experience it as loss of role or connection. The respondent suggests
          reframing this as moving from logistical help to relationship time.
          Additionally, family caregivers need control over what they can see —
          the elderly person should decide what information gets shared (e.g.,
          medication adherence yes, bathroom visits no, fall alerts yes, social
          activity no). Privacy decisions should rest with the elderly person,
          not default to caregiver blanket access."
        role: Information gatekeepers and emotional anchors — family members monitor
          safety but also have psychological investment in being needed; their
          trust in the system is a prerequisite for behavior change
        concerns:
          - System must be trustworthy to actually change their behavior — false
            alarms or missed emergencies will cause them to abandon the system
            and return to daily check-ins
          - Family members may experience loss of role or connection if their
            relative becomes truly independent
          - Tension between stated desire for relative's independence and
            psychological attachment to being needed in a logistical capacity
          - Need for the elderly person to control what information family can
            access, not default family access to all health data
          - Privacy within families matters — some health data (bathroom visits,
            social activity) may be sensitive even to trusted family members
        contradictions: []
        waitingRoomItems:
          - content: System design must include privacy controls allowing the elderly person
              to decide what data is shared with family caregivers and what is
              not — this is a feature requirement, not optional
          - content: Alert reliability is critical to adoption — false positives erode trust
              and cause family to revert to frequent manual check-ins; system
              must be calibrated to avoid wolf-crying
          - content: Family caregiver behavior change (reducing check-ins) is contingent on
              demonstrated system trustworthiness, not on the system working
              objectively — this may require a calibration or onboarding phase
          - content: "Reframing independence outcome: shift family expectations from
              'relative stops needing help' to 'relative needs less logistical
              coordination, enabling more genuine relationship time'"
        responseClass: answer
    - id: stakeholder-elaboration-stakeholder_004-0-composition-r0
      value:
        question: What **decisions or actions** would you want the system to flag to you
          about your patients?
        suggestions:
          - Notable changes in medication adherence or timing patterns that
            suggest compliance problems
          - Physiological trends (blood pressure, heart rate variability) that
            shift outside their normal range, with context about what's normal
            for them
          - Situations where the elderly person might benefit from a
            conversation with me — not emergencies, but things I should know
            about in our next appointment
    - id: stakeholder-elaboration-stakeholder_004-0-question-r0
      value: >-
        (a) and (b) yes, but with limits. (c) is tricky — we can't be the system
        that surfaces "things you should know about." That scales poorly and
        turns into noise.


        Here's what actually matters: **medication adherence and significant
        physiological deviations from their baseline**. Not absolute normal
        ranges — *their* normal. A 78-year-old's baseline BP might be higher
        than textbook normal, and that's fine. But if *their* reading jumps 20
        points, that's actionable.


        The constraint is data access. We're dealing with HIPAA, so we can't
        just dump all their health readings into a provider dashboard. Doctors
        need to explicitly opt in to receive data, and the elderly person
        controls what gets shared. That's non-negotiable legally and ethically.


        And medication — yes, flag adherence patterns. But the system can't
        recommend adjustments or make clinical decisions. It surfaces what's
        happening; the doctor decides what to do. The medication reminders are
        guidance only, not medical advice. That liability piece matters.
    - id: stakeholder-elaboration-stakeholder_004-0-extraction-r0
      value:
        responseInterpretation: "Healthcare providers want the system to flag medication
          adherence patterns and significant physiological deviations from each
          patient's baseline (not absolute normal ranges). They reject the
          suggestion to surface general \"things you should know about\" because
          it scales poorly and creates noise. Critical constraint: HIPAA limits
          data access—elderly people must explicitly control what health data
          gets shared with providers, and providers must opt in to receive it.
          The system can flag patterns but cannot recommend clinical adjustments
          or make medical decisions; doctors decide what to do with the
          information. Medication reminders are guidance only, not medical
          advice, due to liability concerns."
        role: Clinical decision-makers who receive flagged patterns and decide on
          interventions, subject to patient-controlled data sharing and
          legal/ethical constraints around clinical recommendations
        concerns:
          - System cannot scale to surface open-ended "things you should know
            about" — that becomes noise
          - HIPAA compliance requires explicit patient opt-in and control over
            which health data is shared with providers
          - Providers must have ability to opt in to receiving data, not receive
            it by default
          - System must not make clinical recommendations or medication
            adjustments — that is provider's decision
          - Medication reminders constitute guidance only, not medical advice,
            to manage liability
          - Patients control what information family members and providers can
            access, not providers deciding on default access
        contradictions: []
        waitingRoomItems:
          - content: HIPAA data access constraints — elderly person controls what gets
              shared with providers, providers must opt in to receive data
          - content: "System role boundary: can flag patterns and adherence, cannot
              recommend clinical adjustments or make medical decisions"
          - content: Medication reminders are guidance only, not medical advice — liability
              distinction
        responseClass: answer
    - id: stakeholder-elaboration-stakeholder_005-0-composition-r0
      value:
        question: What **accessibility barriers** would elderly users with varying
          abilities face with this kind of system?
        suggestions:
          - Vision or hearing loss affecting how alerts and medication reminders
            get noticed; interface text sizes and audio clarity matter hugely
          - Arthritis or tremor making touchscreen interaction difficult — the
            system needs large tap targets and maybe voice or button
            alternatives
          - Cognitive changes affecting how people process information on
            screens — simpler layouts and fewer choices could make the
            difference between someone checking their health data or ignoring it
            entirely
    - id: stakeholder-elaboration-stakeholder_005-0-question-r0
      value: >-
        All three are real and interconnected. Vision loss means large text
        *and* high contrast. Hearing loss means visual alerts *alongside* audio
        — not instead of. Motor control issues mean not just big buttons, but
        also predictable placement so muscle memory works. Cognitive decline
        means minimal navigation depth — don't make someone dig through five
        screens to find their medication schedule.


        Here's what's not obvious: these constraints aren't separate features
        you add on. They're baked into *everything*. An emergency alert that's
        inaccessible is worthless. A medication reminder they can't see or hear
        is worse than nothing. Privacy controls that are too complex to
        understand become a barrier to people controlling their own data.


        So accessibility isn't a checkbox — it shapes the core design. Voice
        interaction is probably the primary interface for many users, not a
        nice-to-have. That means speech recognition has to handle elderly speech
        patterns: slower, softer, possibly accented. Standard voice tech doesn't
        always work well for that.


        The real gap is that we don't have accessibility specialists embedded on
        the team yet. We're managing it as best we can, but we're not experts in
        adaptive tech. That's a known risk.
    - id: stakeholder-elaboration-stakeholder_005-0-extraction-r0
      value:
        responseInterpretation: "The respondent confirmed that vision loss, hearing
          loss, motor control issues, and cognitive decline are all real and
          interconnected. They emphasized that accessibility constraints are not
          separate features but must be baked into core design. They highlighted
          that an inaccessible emergency alert is worthless, an unperceivable
          medication reminder is worse than nothing, and overly complex privacy
