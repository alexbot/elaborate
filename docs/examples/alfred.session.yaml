    - id: goal-seed-extraction
      value:
        goals:
          - title: Extend independent living duration
            description: Enable users to remain safely in their homes for measurably longer
              periods before transitioning to assisted living, through early
              detection of health changes and reduced dependency on family for
              routine monitoring.
            rationale: The measurement already identifies this as the core outcome, but it
              deserves explicit goal status. Everything else (medication
              reminders, fall detection, social contact) is instrumental to this
              end state.
          - title: Build user confidence in daily risk-taking
            description: Shift users' internal locus of control from anxiety about
              capability to trust in safety oversight. Users should feel
              equipped to attempt activities they currently avoid or delay (solo
              walks, meal preparation, errands) because the system provides
              reliable oversight.
            rationale: The advantage statement identifies confidence-removal as the
              mechanism for independence, but confidence itself isn't explicitly
              a goal. Without this psychological shift, monitoring alone doesn't
              change behavior.
          - title: Reduce family caregiver burden and decision fatigue
            description: Lower the frequency and complexity of check-ins family members must
              initiate or coordinate by shifting routine monitoring to the
              system, freeing family time for relational (not logistical)
              interaction.
            rationale: Family check-ins appear in measurement as a leading indicator, but
              the goal isn't fewer check-ins — it's shifting what check-ins are
              for. This goal captures a secondary outcome that affects system
              adoption (families will advocate for it) and sustainability
              (reduces caregiver burnout).
        drainedWaitingRoomIds: []
    - id: goal-seed-present-r0
      value: >-
        Those three are solid. I'd add one more:


        **Enable safe autonomy in health decisions** — Users need to understand
        their own health status well enough to make informed choices (when to
        call a doctor, whether to adjust routines) without needing someone else
        to interpret the data for them. Right now many elderly people can't
        access or understand their own health information, so they defer to
        family or providers. The system should empower them to be the
        decision-maker, not just the monitored person.


        That's distinct from (b) because it's not about physical confidence —
        it's about informational confidence. They need to *understand* what the
        system is telling them.


        Keep all three of yours. Those are the ones that matter most
        operationally.
