    - id: scope-contrast-2-composition-r0
      value:
        question: Is defining **notification frequency thresholds** for medication
          reminders part of what you want to build, or does that belong in a
          later phase?
        suggestions:
          - In scope now — we need to decide how often reminders appear (daily,
            per dose, adaptive based on adherence patterns) before we design the
            system.
          - Out of scope for now — we'll build the reminder framework, then
            calibrate frequency in pilot testing with real users.
          - Partially in scope — we'll set safe defaults, but the elderly person
            and family should be able to adjust frequency themselves.
    - id: scope-contrast-2-question-r0
      value: >-
        (b) with a caveat: we need to build the *infrastructure* now so we can
        calibrate later. The system has to support adaptive frequency —
        adjusting based on adherence patterns, time of day, user preferences —
        even if we don't nail the exact thresholds yet.


        (c) matters too. Users and family should be able to adjust. Someone
        might say "I'm reliable with my morning meds, don't remind me. But flag
        the evening dose if I miss it." That flexibility needs to be baked in.


        But the hard thresholds — "alert after 4 hours of missed medication"
        versus "8 hours" — that's a pilot question. We'll learn from real use
        whether we're creating alert fatigue or missing problems. Ship with
        conservative defaults (err on the side of reminding), then tighten based
        on what users actually do.
    - id: scope-contrast-2-extraction-r0
      value:
        responseInterpretation: Notification frequency thresholds are out of scope for
          immediate definition but infrastructure to support adaptive frequency
          must be built now. The system must support adjustment by users and
          family (e.g., 'don't remind me for morning meds, flag evening dose if
          missed'). Hard thresholds like '4 hours vs 8 hours missed medication'
          are determined through pilot testing. Ship with conservative defaults
          that err toward reminding, then calibrate based on actual user
          behavior and alert fatigue patterns.
        classification: deferred
        reason: Threshold values ('4 hours vs 8 hours') are deferred to pilot phase, but
          the capability to support adaptive frequency and user/family
          adjustment must be designed and built now.
        relatedGoals:
          - goal_001
          - goal_004
        waitingRoomItems:
          - content: Alert fatigue is a real risk — need to learn from pilot whether
              conservative defaults (remind often) or tighter thresholds reduce
              medication non-adherence without creating notification burden
        responseClass: answer
