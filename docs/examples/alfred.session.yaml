    - id: stakeholder-review-present-r0
      value: >-
        Keep a, b, c, d. But I'd be careful with (e) — we don't have
        accessibility specialists *on the project*, but we definitely need them.
        That's a gap we're managing, not a stakeholder we have.


        I'd add one more: **professional caregivers and aides** — people paid to
        help with daily tasks who are in the home regularly. They're different
        from family. Family wants peace of mind; aides need to coordinate with
        the system (knowing when medication was taken, what the person did that
        day) and adjust their routines based on what the system shows. They're
        secondary but active.


        Also, keep (c) and (d) separate — family and healthcare providers have
        different needs and sometimes conflicting ones. Family wants to monitor
        everything; doctors want HIPAA-compliant data they can actually act on.
        Worth distinguishing.
