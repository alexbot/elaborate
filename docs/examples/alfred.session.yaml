    - id: opening-greet-r0
      value: >-
        I appreciate the greeting, but I should clarify my role here. I'm a
        stakeholder being interviewed *about* a project that's already under way
        — not someone using Eli to scope a new idea.


        We're building a platform to help elderly people live independently at
        home. It covers health monitoring, medication management, emergency
        response, social connectivity, and home automation — all designed for
        users with varying tech literacy.


        What would you like to know about it?
    - id: opening-greet-extraction-r0
      value:
        purpose: Help elderly people live independently at home through health
          monitoring, medication management, emergency response, social
          connectivity, and home automation
        stakeholders:
          - elderly people
          - users with varying tech literacy
        domainHints:
          - health monitoring
          - medication management
          - emergency response
          - social connectivity
          - home automation
          - independent living
        responseClass: answer
