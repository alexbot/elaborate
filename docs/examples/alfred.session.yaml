    - id: purpose-advantage-0-composition-r0
      value:
        question: What **advantage** does this approach offer compared to how elderly
          people currently manage their health and daily needs?
        suggestions:
          - Reduces the need for frequent family check-ins or caregiver visits
            by automating routine monitoring
          - Gives people confidence to stay in their own home instead of moving
            to assisted living
          - Catches health changes earlier through consistent tracking rather
            than waiting for symptoms to become obvious
    - id: purpose-advantage-0-question-r0
      value: >-
        I'd say it's mostly (b) and (c) combined.


        The core thing is: people want to stay home. Moving to a facility means
        losing independence, community, familiar surroundings — and it's
        expensive. But family and caregivers get anxious because they can't
        monitor things continuously. Our system lets the person stay put while
        giving everyone else peace of mind through consistent, automated
        visibility into health metrics, medication adherence, emergency
        capability.


        And yes, catching changes early matters. A fall detected immediately,
        medication skipped, blood pressure trending up — that's the difference
        between a small intervention at home and a hospital admission. But the
        real win is psychological: people feel safer staying independent because
        there's a safety net.
    - id: purpose-advantage-0-extraction-r0
      value:
        purpose: null
        advantage: "People want to stay home rather than move to a facility because it
          means losing independence, community, and familiar surroundings — and
          facilities are expensive. The system lets the person stay put while
          giving family and caregivers peace of mind through consistent,
          automated visibility into health metrics, medication adherence, and
          emergency capability. Catching changes early matters — a fall detected
          immediately, medication skipped, blood pressure trending up — that's
          the difference between a small intervention at home and a hospital
          admission. The real win is psychological: people feel safer staying
          independent because there's a safety net."
        measurement: null
        responseInterpretation: Endorses suggestions (b) and (c) combined. The
          respondent prioritizes independence and staying at home as the core
          advantage, with early detection of health changes as a secondary but
          meaningful benefit. Frames the system's value as both practical
          (safety net, early intervention) and psychological (confidence, peace
          of mind for both elderly person and family).
        contradictions: []
        responseClass: answer
    - id: purpose-measurement-0-composition-r0
      value:
        question: What would you measure to know this system actually helped you stay
          independent at home?
        suggestions:
          - Number of times I caught a health issue early before it became
            serious (like noticing my blood pressure trending up)
          - How many weeks or months longer I was able to stay home instead of
            moving to a facility
          - Whether my family checks in less often because they trust the system
            to alert them if something's wrong
    - id: purpose-measurement-0-question-r0
      value: >-
        Honestly, (b) is the one that matters most to me. If someone uses this
        system and stays home six months longer — or a year longer — instead of
        moving to assisted living, that's the win. That's independence.


        (a) and (c) are real, but they're mostly leading indicators of (b).
        Early detection and reduced check-ins only matter if they actually
        extend how long someone can safely stay at home.


        The tricky part is that we can't always separate our system from other
        factors — better health habits, a supportive family nearby, access to
        in-home care. But if we see a pattern where people using the platform
        stay independent longer than comparable people without it, that's proof.
    - id: purpose-measurement-0-extraction-r0
      value:
        purpose: null
        advantage: null
        measurement: Number of weeks or months longer users stay home instead of moving
