    - id: scope-seed-present-r0
      value: >-
        Good breakdown. Let me address the unclear items first since those are
        real decisions:


        **m) Aide emergency alert handling** — Yes, aides should receive fall
        alerts if they're scheduled to be in the home. But they're responders,
        not decision-makers. If someone falls, the aide checks on them and calls
        family or 911 if needed. They don't silence alerts or decide "this isn't
        serious enough to act on." The system should know aide schedules so
        alerts route intelligently.


        **n) Aide responsibility boundaries** — Medication gaps and vital
        changes are *reporting* items, not action items for aides. An aide sees
        "medication was skipped yesterday" and tells family or the person
        themselves, but doesn't decide to give an extra dose or change routines.
        Vital pattern changes go to family; aides flag them. Clear boundary.


        **o) Notification frequency** — This is the hardest one. Too many alerts
        and people ignore them all (alert fatigue). Too few and you miss real
        problems. I don't have a formula, but we probably need to calibrate per
        person based on their baseline. Someone stable on their meds gets fewer
        reminders; someone with erratic adherence gets more. And we learn over
        time.


        **p) Onboarding/calibration** — Yes, this is real. Family won't trust
        the system until it's proven itself. We probably need a ramp-up period
        where it runs in parallel with existing routines before family actually
        reduces check-ins. That's part of adoption, not a technical feature, but
        it matters for success.


        On scope: I'd move **home automation** back *in* — we mentioned it in
        the domain, and people do ask about it. But you're right that we haven't
        detailed what it does. That's a second-phase thing, not MVP. Keep it in
        scope but deprioritize, or explicitly defer to v2.
