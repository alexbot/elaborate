      value: >-
        (a) is absolute. HIPAA compliance and explicit patient consent for data
        sharing — non-negotiable. That's not a nice-to-have, it's legal.


        (b) mostly yes, but with a caveat: we can't assume everyone has a
        smartphone. Some elderly people use basic phones, tablets, or nothing
        digital at all. We need to support multiple device types and degraded
        experiences. Voice interaction becomes more important precisely because
