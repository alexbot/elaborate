        falls, the system can't just fail. We need local fallback — the device
        detects the fall and alerts locally, retries the internet connection,
        and has a manual override. That's a technical architecture constraint
        that affects everything.


        And accessibility isn't negotiable either. We can't ship something
        elderly users can't use. That means testing with actual users who have
        vision loss, hearing loss, tremor — not just running it past a
        checklist.
