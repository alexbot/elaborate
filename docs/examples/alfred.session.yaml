    - id: validation-wr-classify
      value:
        routed:
          - id: waiting_011
            target: assumption
            content: Family caregiver behavior change (reducing check-ins) is contingent on
              demonstrated system trustworthiness, not on the system working
              objectively.
            reason: This is a foundational belief about what drives family behavior change.
              It's testable (pilot data will show whether behavior shifts
              correlate with trustworthiness signals vs. objective performance)
              and critical to the project's success. Already partially captured
              in stakeholder_003 concerns, but this assumption deserves explicit
              status because it shapes what 'success' means for the onboarding
              phase.
          - id: waiting_012
            target: assumption
            content: Independence outcome should be reframed as 'relative needs less
              logistical coordination, enabling more genuine relationship time'
              rather than 'relative stops needing help'.
            reason: This is a claim about what independence actually means for this
              population and for family dynamics. It's testable through
              interviews and outcome measurement. It's not a finding (risk or
              gap) — it's a premise about the desired end state that constrains
              how measurement and success are defined. Differs from goal_001
              (extend duration) because it reframes the *type* of independence.
          - id: waiting_016
            target: finding
            content: Accessibility specialists are not currently embedded on the team;
              managing accessibility without experts is a known risk.
            reason: "This is a gap in team composition with clear risk implications.
              Constraint_005 already requires accessibility testing with actual
              users, but this finding flags the operational gap: the team lacks
              the continuous expert oversight needed to bake accessibility into
              core design. This is actionable — either embed the expertise or
              contract it."
          - id: waiting_017
            target: finding
            content: Notification frequency calibration per person based on baseline
              stability and learning over time — mechanism for adjusting alert
              thresholds is undefined.
            reason: "This identifies a specific gap in the design: the system needs to adapt
              reminder frequency, but the algorithm, rules, and UX flow don't
              exist yet. It's neither fully an assumption nor residual — it's a
              capability gap that must be addressed before the pilot. Related to
              waiting_025 (calibration thresholds undefined) but more specific."
          - id: waiting_018
            target: assumption
            content: Onboarding/calibration ramp-up period where system runs in parallel
              with existing family routines is an adoption precondition — family
              must see the system work reliably before they reduce check-ins.
            reason: This is an assumption about the operational model for the pilot and
              adoption. It's testable (pilot data will show whether families who
              experience a ramp-up period actually reduce check-ins, and whether
              behavior change without it fails). Already implicit in waiting_011
              but this spells out the *mechanism* (parallel operation, not
              cutover).
          - id: waiting_019
            target: finding
            content: System must support degraded experiences and multiple interaction
              modalities — voice interaction becomes critical precisely because
              not everyone can use touchscreen.
            reason: This is in-scope (mentioned in constraints and stakeholder_005) but the
              finding here is that the design must treat voice as *primary*, not
              optional. This is a design directive that affects priority and
              testing — it's not captured with enough emphasis in the current
              artifacts. The connection between accessibility and feature
              priority is the actionable insight.
          - id: waiting_020
            target: finding
            content: Accessibility testing with actual users who have vision loss, hearing
              loss, tremor is a prerequisite for shipping — standard compliance
              testing is insufficient.
            reason: Constraint_005 already states this, but this finding reinforces it as a
              *blocker*, not a nice-to-have. The emphasis on actual user testing
              (not checklist compliance) is the actionable quality bar. This is
              captured elsewhere but worth flagging as a critical gate.
          - id: waiting_021
            target: finding
            content: System must surface medication adherence gaps clearly so family and
              aides know it happened — visibility and reminder are core system
              functions, enforcement is not.
            reason: "This clarifies a boundary: the system's role is to make gaps *visible*,
              not to prevent or enforce. This is a design principle that
              prevents scope creep into clinical territory. It's captured in
              inScope items but deserves explicit status as a finding because it
              directly contradicts a plausible alternative (system autonomously
              tries to enforce adherence)."
          - id: waiting_022
            target: finding
            content: "Aide messaging pattern: aide alerts person or family with factual
              statement ('you didn't take your 9am medication, do you want to
              take it now?'), person or family decides next action."
            reason: This specifies a UX pattern and responsibility boundary for aides. It's
              a design decision that clarifies what aides can and cannot do.
              It's not yet in the artifacts as a specific pattern — it's a
              finding that drives aide interaction design and role clarity.
          - id: waiting_023
            target: assumption
            content: System can route alerts only to aides actually present or on-call —
              assumes scheduling integration exists.
            reason: "This is a dependency assumption: the system's ability to avoid alerting
              off-duty aides depends on having access to aide schedules. It's
              testable and necessary for the aide alert feature to work.
              Currently in inScope but the dependency (scheduling integration)
              is not explicit."
          - id: waiting_024
            target: residual
            content: Family trust in the system is a prerequisite for behavior change —
              relates to confidence and system trustworthiness assumptions
              already captured in stakeholder_003.
            reason: This is already absorbed into stakeholder_003 concerns, goal_002 (build
              confidence), waiting_011, and waiting_018. It's a foundational
              theme repeated across multiple artifacts. Adding it as a separate
              assumption creates duplication without new information.
          - id: waiting_025
            target: finding
            content: System design for notification frequency — balancing non-intrusiveness
              against medication adherence risk; calibration thresholds
              undefined.
            reason: "This is a specific design gap: the tradeoff between alert fatigue and
              adherence is identified, but the mechanism for making that
              tradeoff (thresholds, rules, learning) is undefined. Related to
              waiting_017 but broader in scope — it encompasses both frequency
              *and* threshold definition."
          - id: waiting_026
            target: finding
            content: Alert fatigue is a real risk — pilot must test whether conservative
              defaults (remind often) or tighter thresholds reduce medication
              non-adherence without creating notification burden.
            reason: "This is a specific empirical question for the pilot: the direction of
              the tradeoff (frequent reminders vs. tight thresholds) is
              uncertain. It's a finding because it identifies a design decision
              that must be validated by real user data, not resolved upfront.
              This drives pilot instrumentation and success metrics."
