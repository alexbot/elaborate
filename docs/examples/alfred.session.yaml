    - id: goal-refinement-goal_004-clarify-0-composition-r0
      value:
        question: What would it look like for someone to feel confident making **health
          decisions** on their own at home?
        suggestions:
          - Taking medication without waiting for a reminder, or deciding
            whether to rest or see a doctor without checking with family first
          - Knowing when a symptom is serious enough to call for help versus
            something manageable at home
          - Continuing daily activities like cooking or showering without fear
            of a fall or medical emergency going unnoticed
    - id: goal-refinement-goal_004-clarify-0-question-r0
      value: >-
        It's mostly (a) and (b), but not quite how you framed them.


        For medication: the system should *inform* the person, not remind them.
        "Here's your blood pressure reading, here's what your doctor said the
        target should be" — then *they* decide whether to take it, not just
        react to a beep. Same with rest versus doctor: they see their trends,
        they know their body, they make the call.


        For (b), it's about recognizing patterns themselves. A single high
        reading isn't alarming. But if they can see "my BP has been creeping up
        for three days" or "I've fallen twice this week," they can think clearly
        about whether that's "call the doctor" or "I was just clumsy." Right now
        they either ignore everything or panic at every blip because they don't
        have the full picture.


        The key is: the system gives them data and context so they're not flying
        blind. They're not waiting for family to interpret, and they're not
        making decisions in ignorance.
    - id: goal-refinement-goal_004-clarify-0-extraction-r0
      value:
        responseInterpretation: Safe autonomy in health decisions means the system
          provides data and context (blood pressure readings, doctor targets,
          trend patterns over days) so the person can make informed decisions
          themselves, rather than either ignoring information or panicking at
          isolated readings. For medication, the person sees their readings and
          doctor's targets, then decides whether to take it—not reacting to a
          reminder. For symptom evaluation, they can recognize patterns ('BP
          creeping up for three days' or 'fallen twice this week') and decide
          whether to call a doctor or recognize it as something manageable. The
          person is not flying blind and not dependent on family to interpret
          information.
        title: Enable safe autonomy in health decisions
        description: The person receives health data and context (readings, targets,
          trends) that lets them recognize patterns and make informed decisions
          about medication and symptom severity without waiting for reminders,
          family interpretation, or panicking at isolated readings.
        rationale: Autonomy requires both information and the ability to see patterns.
          Without data visibility, people either ignore symptoms or overreact to
          noise. With clear trends and context, they can think clearly about
          whether a change warrants calling a doctor.
        contradictions: []
        waitingRoomItems:
          - content: System should inform rather than remind—shift from reactive alerts to
              proactive data presentation
          - content: Person needs to see multi-day trends, not isolated readings, to
              recognize patterns reliably
          - content: Data and context must be accessible to the person directly, not
              mediated through family or caregivers
        responseClass: answer
    - id: goals-confirmation-r0
      value: >-
        This is good. One clarification on goal #3 though.


        The system shouldn't just *give* them data — it needs to present it in a
        way they can actually understand. A 73-year-old with vision problems
        can't read a dense graph. Someone with mild cognitive decline can't
        parse a table of numbers. The data has to be accessible, which means
        large text, simple language, maybe audio or visual alerts instead of
        numbers.


        That's not a separate goal, but it's baked into #3. Without
        accessibility, the autonomy part breaks down. They're staring at
        information they can't read and making decisions in ignorance anyway.


        Otherwise, those three capture it. Ready to move on.
