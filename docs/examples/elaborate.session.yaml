        suggestions:
          - Specific schema (JSON, YAML, or similar) — tools consuming the
            artifacts need predictable structure to parse and reason about them
          - Structured plain text with clear conventions (headings, sections,
            bullet points) — human-readable and AI-consumable without rigid
            constraints
          - Both — human-facing outputs in plain text, machine-facing outputs in
            schema format
    - id: scope-contrast-2-question-r0
      value: >-
        (c) — both. The artifacts need to be machine-readable for downstream
        tools (an AI assistant shouldn't have to parse prose), but the
        human-facing record should be plain text with clear structure so I can
        actually read and reason about it without needing a parser.


        The schema is the canonical form; plain text is the readable projection
        of it.
    - id: scope-contrast-2-extraction-r0
