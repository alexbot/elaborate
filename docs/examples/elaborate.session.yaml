    - id: stakeholder-elaboration-stakeholder_004-0-question-r0
      value: >-
        All three matter, but (c) is the linchpin. If the assistant doesn't know
        what we *rejected* or *debated*, it'll confidently build around
        assumptions we already decided were wrong. That's worse than starting
        from scratch.


        So the tool's output — the structured artifacts — has to be consumable
