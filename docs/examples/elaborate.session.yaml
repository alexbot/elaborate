    - id: purpose-advantage-0-composition-r0
      value:
        question: What would **structured elicitation** give you that your current
          approach to planning doesn't?
        suggestions:
          - A way to catch scope creep or conflicting goals before I start coding
          - Confidence that I've actually thought through the problem instead of
            just diving in
          - A record of my reasoning so I can revisit assumptions later without
            starting from scratch
    - id: purpose-advantage-0-question-r0
      value: >-
        It's closer to (c), but with a twist.


        Right now when I plan something, I think it through in my head or jot
        notes — but there's no *external pressure* forcing me to be precise. I
        can gloss over contradictions because I'm not explaining to anyone else.
        A structured interview makes those gaps visible. If the AI asks "wait,
        you said X but also said Y — which is it?" I can't hand-wave it.


        And that record matters. Not just for revisiting later, but because the
        *act of articulating it to someone else* — even an AI — changes what I
        think. Half the value is the conversation itself, not the artifact at
        the end.
    - id: purpose-advantage-0-extraction-r0
      value:
        purpose: null
        advantage: Structured elicitation forces external articulation that exposes gaps
          and contradictions the respondent would otherwise gloss over. The act
          of explaining to another party — even an AI — changes thinking and
          reveals assumptions that internal planning masks. The record enables
          revisiting reasoning without reconstruction.
        measurement: null
        responseInterpretation: "The respondent values structured elicitation primarily
          for option (c) — the artifact and record — but with a critical
          addition: the external pressure of having to explain to someone else
          makes imprecision visible and untenable. Contradictions that survive
          internal planning (where the respondent can hand-wave) become exposed
          when articulated. The conversation itself, not just the final
          artifact, is where value is created."
        contradictions: []
        responseClass: answer
    - id: purpose-measurement-0-composition-r0
      value:
        question: How would you know if this tool helped you **clarify your project**
          before you started building?
        suggestions:
          - I'd have written down what problem I'm solving and who needs it
            solved, instead of just having a vague feeling
          - I'd catch contradictions in my thinking — like realizing I'm
            actually solving two different problems, not one
          - I'd be able to explain my project to someone else without
            backtracking or saying 'well, actually' five times
    - id: purpose-measurement-0-question-r0
      value: >-
        All three, actually. But the real test is (b) — if I walk away having
        *discovered* something I didn't know I was confused about, the tool
        worked. 


        The contradiction catch is the proof point. If the interview surfaces a
        conflict I didn't see (like "you want this to be domain-agnostic but
        you're designing it for software developers" or "you care about
        durability but you're treating sessions as ephemeral"), that's when I
        know the tool forced real clarity, not just documentation.
