          more useful than 'We rejected offline-first architecture.' This
          reasoning prevents the assistant from proposing the same rejected
          approach again in different forms or applying it in contexts where it
          might actually fit."
        role: null
        concerns:
          - Without understanding *why* decisions were rejected, the AI
            assistant will confidently reproduce rejected approaches in
            different forms
          - Reasoning about rejected decisions is necessary to prevent applying
            abandoned approaches in contexts where they might actually be valid
          - The AI assistant needs captured decision rationale, not just
            decision outcome, to avoid wasting effort on approaches already
            deemed unsuitable
        contradictions: []
        waitingRoomItems: []
        responseClass: answer
