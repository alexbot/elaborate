    - id: goal-seed-extraction
      value:
        goals:
          - title: Surface hidden contradictions in project thinking
            description: "The tool succeeds when it reveals conflicts between stated goals
              that the respondent didn't know existed — conflicts that are
              actionable (they change how the project would be built, not just
              logical puzzles). Examples: discovering that domain-agnostic
              intent conflicts with designing for a specific audience, or
              finding that durability goals contradict treating sessions as
              ephemeral."
            rationale: The measurement criterion defines this as the core success signal. It
              moves beyond documentation ('we captured what you said') to
              transformative insight ('we found something that changes your
              approach'). This is the outcome that justifies the structured
              interview over unguided thinking.
          - title: Create a durable external record of project reasoning
            description: The tool produces a persistent artifact of the clarification
              process — the reasoning chain, assumptions, and decisions — that
              the respondent can revisit without reconstruction. This enables
              them to return to the work later, share context with
              collaborators, or trace how earlier decisions influenced later
              ones.
            rationale: The advantage statement emphasizes that 'the record enables
              revisiting reasoning without reconstruction' — this is a distinct
              outcome from the moment of clarity itself. It's infrastructure for
              sustained thinking, especially valuable for projects that have
              long design cycles or involve multiple stakeholders.
          - title: Remove activation friction for the clarity phase
            description: The tool makes structured elicitation concrete and accessible
              enough that people who normally skip clarity work (because they
              lack a structured process) will actually use it. Success means
              careful planners move from skipping clarity to treating it as a
              normal part of starting a project.
            rationale: "The purpose identifies a real barrier: people know clarity matters
              but lack a concrete, usable method, so they skip it and jump to
              implementation. This goal captures the behavioral shift the tool
              enables — not just offering clarity, but making it the default
              path."
