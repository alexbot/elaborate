title: Helps anyone starting with a vague idea think through project ideas
  before building by asking Socratic questions to clarify what they actually
  need, regardless of discipline. The tool makes the clarity phase concrete and
  useful, especially for careful planners who often skip this phase because they
  lack a structured way to do it.
