    - id: scope-constraint-composition-r0
      value:
        question: What **hard constraints** must your tool work within?
        suggestions:
          - Limited token budget or API costs for running interviews at scale
          - Sessions must complete in a single conversation (no resumption
            across multiple interactions)
          - Tool output must integrate with existing workflows or systems
            already in use
    - id: scope-constraint-question-r0
      value: >-
        (c) is the hard constraint. This is a CLI tool that lives inside
        existing developer workflows — it integrates into AI coding assistants
        like Claude's Code skill, or runs from the terminal in an existing dev
        environment. It's not a standalone web app or SaaS platform.


        That shapes everything: how users invoke it, where session state lives,
        what formats it outputs, how it fits into the user's existing toolchain.
