workflow:
  status: completed
  entries:
    - id: opening-greet-r0
      value: >-
        I'm building an AI tool that helps people think through their project
        ideas before they start building. Like a Socratic interviewer — it asks
        questions to help you figure out what you actually need, instead of
        jumping straight to code or generating a spec from a one-line prompt.


        The problem is that people often start with a vague idea, rush into
        implementation, and realize halfway through they misunderstood the
        requirements or built the wrong thing. This tool sits in the middle —
        it's supposed to be the thinking phase, the sense-making phase.
    - id: opening-greet-extraction-r0
      value:
        purpose: Helps people think through project ideas before building by asking
          Socratic questions to clarify what they actually need, instead of
          jumping to implementation or generating specs from vague prompts. Sits
          in the thinking phase to catch misunderstood requirements before they
          result in building the wrong thing.
        stakeholders:
          - people with vague project ideas
          - people who tend to rush into implementation
        domainHints:
          - AI tool
          - requirements elicitation
          - Socratic interviewing
          - project planning
          - sense-making
        responseClass: answer
