    - id: scope-contrast-0-composition-r0
      value:
        question: Should the **dialog framework** adapt its prescriptiveness based on
          what you demonstrate, or stay consistent throughout?
        suggestions:
          - Stay consistent — use the same structured sequence every time so I
            know what to expect
          - Adapt — throttle back detailed scaffolding if I'm articulate; expand
            if I'm circling or stuck
          - Hybrid — follow a consistent skeleton but adjust the depth of
            questions within each phase
    - id: scope-contrast-0-question-r0
      value: >-
        (c) — consistent skeleton, variable depth. I need predictability (I know
        we're moving through purpose → goals → stakeholders → scope →
        assumptions), but the tool should recognize when I'm being vague and
        drill deeper, or when I've already been precise and move on.


        The skeleton is the forcing function; the depth adjusts to avoid wasting
        time.
    - id: scope-contrast-0-extraction-r0
      value:
        responseInterpretation: "The dialog framework should maintain a consistent
          structural skeleton (purpose → goals → stakeholders → scope →
          assumptions phases) that respondents can predict and rely on. Within
          that predictable structure, the depth and granularity of questions
          should vary based on demonstrated clarity: throttle back detailed
          scaffolding when the respondent articulates clearly, expand and drill
          deeper when responses are vague or circular. The skeleton provides
          forcing function and predictability; depth adjustment prevents time
