    - id: scope-contrast-1-composition-r0
      value:
        question: Is the tool successful if it surfaces one **actionable
          contradiction**, or should it target a minimum number of
          contradictions per session?
        suggestions:
          - One solid contradiction that changes how I'd build it — that's
            enough.
          - I'd want at least 2-3 contradictions to feel like the tool earned
            the time investment.
          - Depends on the project — complex projects need more, simple ones
            might need just one.
    - id: scope-contrast-1-question-r0
      value: >-
        (a) — one solid contradiction is enough. If I walk away having
        discovered something that changes my approach, the tool worked. Chasing
        a quota would push toward forcing contradictions that don't matter,
        which defeats the purpose.


        That said, in practice I expect most sessions will surface multiple
        insights naturally. But success isn't measured by hitting a number.
    - id: scope-contrast-1-extraction-r0
      value:
        responseInterpretation: Success is measured by surfacing one solid, actionable
          contradiction that changes the respondent's approach to building the
          project. Hitting a quota of contradictions is counterproductive — it
          would force artificial contradictions that don't matter. The
          respondent expects multiple insights will naturally emerge in most
          sessions, but the success criterion is not a numerical target.
        classification: in
        reason: ""
        relatedGoals:
