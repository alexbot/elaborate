    - id: purpose-confirmation-r0
      value: >-
        That's solid. One thing I'd sharpen:


        On the audit trail — it's not just "know who did it." We have a
        regulatory requirement that every submission, correction, and
        certification action gets logged with user identity and timestamp, and
        that log has to be immutable. So it's not optional nice-to-have, it's
        compliance. That might matter for how the team thinks about the
        architecture.


        Also add: **Agencies have 30 days to fix rejected submissions before
        public reporting deadlines hit.** Right now that timeline is tight, and
        if the system doesn't get corrections turned around fast, we miss
        statutory deadlines. So turnaround time on validation feedback isn't
        just convenience — it's a hard constraint.


        Everything else tracks.
