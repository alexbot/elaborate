    - id: validation-wr-classify
      value:
        routed:
          - id: waiting_033
            target: assumption
            content: Accounting system vendors are affected by data contracts but do not
              require explicit buy-in for the submission system to proceed with
              integration design.
            reason: This is a boundary assumption about vendor autonomy and integration
              responsibility. It's testable (does the design work without vendor
              pre-approval?) and affects scope and integration sequencing.
              Captures a firm stakeholder_012 constraint.
          - id: waiting_034
            target: residual
            content: Agencies have 30 days total to correct and resubmit.
            reason: Already captured as constraint_002 ('30-day correction window is
              statutory'). This is duplication.
          - id: waiting_035
            target: assumption
            content: Validation feedback must return within 2–3 business days maximum to
              give agencies sufficient time to diagnose and fix within the
              30-day window.
            reason: This is a derived constraint that ties feedback latency to the 30-day
              statutory deadline. It's a testable assumption about system
              responsiveness requirements and directly affects goal_001 ('Enable
              agencies to resolve validation errors within statutory
              deadlines'). Not yet captured.
          - id: waiting_036
            target: finding
            content: If validation feedback takes a week instead of 2–3 business days,
              agencies are left with only 3–4 weeks to diagnose and fix within
              the 30-day window, reducing margin for error and escalation.
            reason: This is a risk observation showing the consequence of latency breach. It
              flags the tight coupling between feedback turnaround and statutory
              deadline pressure and supports the urgency of waiting_035.
          - id: waiting_037
            target: assumption
            content: Rule authoring and deployment sequencing is owned by policy teams, not
              the submission system.
            reason: This is a boundary assumption about system responsibility. It affects
              validation engine architecture (the system receives rules, does
              not author them) and is a firm constraint per respondent feedback.
          - id: waiting_038
            target: assumption
            content: Compliance or policy teams own deciding which rules change and when,
              including fiscal-year transitions.
            reason: Reinforces waiting_037 as a boundary constraint. The submission system
              must support rule versioning (constraint_001) but not own the
              versioning schedule. Testable and architectural.
          - id: waiting_039
            target: assumption
            content: "Actionable validation feedback requires three elements: (1) the
              specific field that failed, (2) what the correct value should be,
              and (3) an example or reference standard."
            reason: This operationalizes 'actionable feedback' (mentioned in inScope but
              left vague). It's a testable quality criterion for validation
              error messages and directly supports goal_001 and stakeholder_005
              concerns. Tightens the definition needed for validation message
              design.
          - id: waiting_040
            target: assumption
            content: Entity mismatch errors (e.g., agency claims an entity is registered in
              SAM but SAM validation rejects it) are not actionable feedback—the
              agency cannot fix a SAM registration mismatch within the
              submission system.
            reason: This is a boundary assumption clarifying what the submission system
              should and should not report as actionable feedback. It affects
              error categorization and inScope item on 'Error categorization
              distinguishing submission system problems from external system
              problems.'
          - id: waiting_041
            target: finding
            content: Unclear whether submissions waiting on external validation (e.g., SAM
              entity validation pending) should receive immediate status
              notification ('check back tomorrow') or be silently queued with
              deferred notification once validation completes. This affects user
              experience and agency visibility.
            reason: This is an unresolved design choice that affects both stakeholder_005
              (operators need visibility) and agency submitters (need to know
              submission status). It's a gap requiring design decision, not a
              settled assumption.
          - id: waiting_042
            target: assumption
            content: USAspending.gov publication SLA and ownership of the SLA are determined
              by system integration teams, not the submission system team.
            reason: This is a boundary assumption about responsibility. It clarifies that
              submission system owns 'data handoff' (already in inScope) but not
              publication timing. Aligns with outOfScope item on USAspending.gov
              integration scope.
          - id: waiting_043
            target: assumption
            content: Compliance/policy teams own rule deployment sequencing and notification
              protocol. The submission system must provide a 'clear notice and
              clean handoff process' to operators, but the detailed
              specification of what 'clear notice' and 'clean handoff' mean is
              deferred to policy teams.
            reason: This is a boundary assumption that defers detail specification to
              another team while establishing the submission system's
              responsibility to support the handoff. It's architectural (affects
              integration points) and testable (can verify handoff mechanism
              works).
          - id: waiting_044
            target: assumption
            content: "The submission system must not author or deploy compliance rules. This
              is a firm architectural boundary per respondent: 'If we start
              authoring rules, we're making compliance decisions we shouldn't be
              making.'"
            reason: Respondent explicitly rejected the hybrid option. This is a constraint
              on system scope and role. It reinforces waiting_037 and
              waiting_038 and should be captured as a binding architectural
              decision, not an open choice. Affects goal_001 and validation
              engine design.
          - id: waiting_045
            target: finding
            content: Assumption that submissions waiting on SAM validation should be queued
              with explanatory status messages depends on clarifying whether
              other external system latencies (e.g., FPDS reads, downstream SLA
              checks) also trigger queueing with similar messaging. Current
              design assumes SAM is special; may need generalized queueing
              protocol for all external validation delays.
            reason: This is a gap in requirements. waiting_041 surfaces the queueing choice;
              this item flags that the design space is larger than just SAM.
              Affects integration architecture and error handling.
          - id: waiting_046
            target: finding
            content: "Workflow operators may need manual override capability to 'escalate'
              or 'reject' queued submissions, but the semantics are undefined:
              does escalation mean expediting SAM validation (technically
              infeasible?) or bypassing it (compliance-permitted?). Define what
              'escalate' means and what conditions permit override."
            reason: This is an unresolved requirement for operator workflows
              (stakeholder_005). The term is ambiguous and its feasibility is
              unclear. Requires design decision and compliance review before
              implementation.
          - id: waiting_047
            target: finding
            content: Agencies are notified that submissions are 'accepted and queued' with
              an expected SAM validation completion date, but the system's
              ability to predict SAM latency reliably is unclear. Clarify
              whether estimates are deterministic, probabilistic, or ranges, and
              define what happens if SAM exceeds the estimated completion date
              (e.g., notification update, escalation option).
            reason: This is a gap in requirements for user-facing notifications and external
              dependency management. It affects both agency submitter experience
              (stakeholder_013) and stakeholder_005 visibility. SAM
              constraint_003 says latency goes up to 48 hours; unclear if that's
              a cap or if variance is larger.
    - id: validation-consistency-check
      value:
        contradictions:
          - description: Goal goal_001 requires validation feedback within statutory
              deadlines (measurement states 30-day window), but assumption_002
              states feedback must return in 2–3 business days. No explicit
              connection exists between the 30-day correction window and the 2–3
              day feedback turnaround. If feedback takes 10 days instead of 3,
              agencies still have 20 days to fix—within the 30-day window.
              Assumption_002 appears to impose a stricter deadline than goal_001
              demands. Clarify whether the 2–3 day target is derived from
              regulatory requirement or operational preference.
          - description: Stakeholder_013 (agency data submitters) concerns state 'Validation
              rules change year to year per DATA Act requirements; submissions
              validated under FY25 rules must stay valid after FY26 rules go
              live,' but no corresponding in-scope item or goal addresses rule
              versioning migration policy. Constraint_001 captures that
              submissions must be validated under rules in effect at submission
              time, but does not address the operational challenge of
              maintaining backward compatibility or communicating rule
              transitions to agencies. This gap may leave agencies without
              guidance on how their FY25 submissions behave after FY26 rules
              deploy.
          - description: "Goal goal_003 requires standardized integration contracts for SAM,
              FPDS, and USAspending.gov, but out-of-scope definition for
              USAspending.gov explicitly excludes scope of USAspending.gov
              integration, citing that 'Publication SLA and timing belong to
              USAspending.gov operations.' This creates a boundary tension:
              goal_003 demands standardized contracts with USAspending.gov, but
              the out-of-scope boundary prevents the submission system from
              owning the contract detail needed to achieve the goal. Clarify
              whether goal_003 applies only to SAM and FPDS, or whether a
              different framing is needed for USAspending.gov integration."
          - description: Stakeholder_005 (agency workflow operators) concerns include
              'Confirm whether submitted corrections actually entered the system
              or remain in queue,' implying the submission system must provide
              visibility into submission queue state. However, no in-scope item
              explicitly captures submission queue visibility or status
              reporting requirements. This concern references a capability that
              is not tracked as in-scope, creating risk that queue visibility is
              forgotten during implementation.
          - description: Assumption_006 states 'Entity mismatch errors are not actionable
              feedback—the agency cannot fix a SAM registration mismatch within
              the submission system,' but in-scope item 'Error categorization
              distinguishing submission system problems from external system
              problems' does not clarify the downstream workflow when SAM
              validation fails. If errors are not actionable within the
              submission system, what does the system tell the agency?
              Assumption_006 identifies a gap in error handling that the
              in-scope item does not fully address.
    - id: validation-summary-present-r0
      value: >-
        This is comprehensive. I have one substantive push-back and one
        clarification:


        **Push back on finding_006:** The 2-3 day feedback target isn't just
        operational preference — it's derived from the 30-day window math. If
        agencies have 30 days total and feedback takes 10 days, they have 20
        days left to fix. But if the fix itself is complex (requires vendor
        coordination, accounting system changes, SAM escalation), 20 days gets
        tight fast. 2-3 days gives them a real buffer to diagnose, coordinate
        fixes, and resubmit without panic. It's not arbitrary — it's the minimum
        turnaround that makes the 30-day window operationally realistic. That
        should be in the justification.


        **Clarification on finding_009:** Submission queue visibility — yes, we
        need it. Agencies and workflow operators both need to see "your
        submission is queued, position 5 of 12, estimated completion [date]."
        That's not optional. Add it to in-scope.


        Everything else I can live with. The findings are fair — they're the
        design questions that need answering. The assumption about rule
        authoring belongs to policy teams, not us. The SAM escalation semantics
        — yeah, that's undefined and needs clarification before build starts.


        Ready to wrap?
