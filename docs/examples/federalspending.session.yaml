    - id: stakeholder-elaboration-stakeholder_003-0-composition-r0
      value:
        question: What **loan submission workflows** does your team currently handle,
          and where do validation delays cause the most friction?
        suggestions:
          - We submit loan data quarterly through a manual CSV upload process;
            validation feedback that takes more than a few days blocks our
            internal reporting deadlines.
          - We manage both loan origination data and loan servicing updates;
            different validation rules apply to each, and we struggle to track
            which corrections were already submitted versus which still need to
            be resubmitted.
          - Our team coordinates with accounting systems vendors on data
            mapping; validation errors often require back-and-forth
            clarification that delays the whole submission cycle by a week or
            more.
    - id: stakeholder-elaboration-stakeholder_003-0-question-r0
      value: >-
        Loans teams submit data differently than grants — they have ongoing
        transactions. Loan originations come through, then servicing updates
        (payments, adjustments, defaults) flow continuously. Some teams do
        quarterly batches, some push data more frequently if they've got the
        technical infrastructure.


        The friction point: validation rules for origination data are different
        from servicing data, and teams often don't know which one failed or why.
        They submit a batch, get told "validation failed," but the error message
        doesn't clearly separate "your origination records have this problem"
        from "your servicing records have that problem." So they end up guessing
        at what to fix.


        Also — when a servicing update gets rejected, they need to know if they
        already submitted a correction for it or if they're resubmitting the
        same bad data. Right now that's manual tracking in spreadsheets. If
        you're pushing transactions weekly or daily, that becomes a nightmare.


        And yeah, some teams work with vendors who handle data mapping for them.
        When validation fails, the vendor and the agency go back and forth: "Is
        this a data quality issue on your end or a mapping issue on ours?" That
        back-and-forth can stretch a two-day turnaround into a week.


        The core need: faster feedback, clearer error messages that distinguish
        between origination and servicing issues, and better tracking so they
        know what's already been resubmitted.
    - id: stakeholder-elaboration-stakeholder_003-0-extraction-r0
      value:
        responseInterpretation: "Loans teams operate differently from grants due to
          ongoing transactions. Loan originations arrive first, then servicing
          updates (payments, adjustments, defaults) flow continuously—some teams
          submit quarterly batches, others push data weekly or daily if they
          have technical infrastructure. The validation feedback is unclear:
          teams get told validation failed but error messages don't distinguish
          whether origination records or servicing records have problems,
          forcing teams to guess at fixes. When servicing updates are rejected,
          teams don't know if they already submitted a correction or are
