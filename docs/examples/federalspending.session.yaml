          Vendor-coordinated data mapping adds friction: when validation fails,
          the back-and-forth between vendor and agency about whether the issue
          is data quality or mapping takes a week instead of two days. The core
          need is faster feedback, error messages that clearly separate
          origination from servicing issues, and better tracking of what's
          already been resubmitted."
        role: Manage both loan origination data and loan servicing updates; handle
          ongoing transaction flows (originations, then continuous servicing
          updates like payments, adjustments, defaults); diagnose validation
          failures and determine which data category failed; track which
          corrections were already submitted to avoid duplicate submissions; may
          coordinate with vendors on data mapping and validation error
          clarification
        concerns:
          - Validation error messages don't distinguish between origination and
            servicing record problems
          - Teams must guess at what to fix when validation fails without clear
            categorization
          - Manual spreadsheet tracking of which corrections were already
            submitted is unsustainable at frequent (weekly/daily) submission
            cadences
          - Confusion about whether rejected servicing updates are already
            corrected or need resubmission
          - Vendor back-and-forth on data quality versus mapping issues
            stretches two-day turnaround into a week
          - Servicing update rejection feedback doesn't clarify root cause (data
            quality vs mapping issue)
        contradictions: []
        waitingRoomItems:
