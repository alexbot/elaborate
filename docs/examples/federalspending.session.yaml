    - id: opening-brownfield-r0
      value: >-
        I don't have existing code or docs to reference — I'm a stakeholder, not
        the build team. I work with the current landscape of systems that'll
        feed into or consume from this new one.


        What I know operationally: FABS (the current submission pipeline) is
        what agencies use to report assistance data, and it feeds into
        USAspending.gov for public reporting. FPDS handles procurement
        separately. SAM is where entities register and get validated.


        The new system replaces FABS and has to play nice with all three. That's
        the brownfield constraint — not greenfield.


        Ready for your questions.
