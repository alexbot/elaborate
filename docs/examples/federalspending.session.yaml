    - id: stakeholder-elaboration-stakeholder_013-0-composition-r0
      value:
        question: What does your team do with **agency data submissions**, and what
          matters most to you when they arrive?
        suggestions:
          - We validate submissions against federal rules and send feedback back
            to agencies before their correction deadlines hit.
          - We receive submissions from multiple agencies, track which ones
            passed or failed validation, and maintain records for audit
            requests.
          - We extract submission data and feed it into downstream systems like
            USAspending.gov or procurement tracking platforms.
    - id: stakeholder-elaboration-stakeholder_013-0-question-r0
      value: >-
        We receive submissions — could be CSV uploads from smaller agencies, API
        pushes from larger ones with integrated systems. We validate them
        against the current ruleset, send back clear feedback on what failed and
        why, and track whether they come back with corrections.


        What matters: speed and clarity. An agency submits on Monday, we need
        validation feedback by Tuesday or Wednesday so they have time to fix it
        and resubmit before the 30-day window closes. And the feedback has to be
        actionable — not just "field X is invalid" but "field X should be a
        valid SAM entity ID, you provided Y which doesn't match any registered
        entity."


        We also track the submission history. Did they resubmit after feedback?
        Did the correction actually fix the problem, or are they submitting the
        same bad data again? That visibility helps us spot patterns — like
        "grants team consistently gets entity validation wrong, maybe they need
        training" or "this particular agency's accounting system is mapping data
        incorrectly."


        Once submissions pass validation and get certified by the agency, we
        hand them off downstream — to USAspending.gov for public reporting, to
        audit teams for compliance review. But until that handoff, we own the
        feedback loop.


        The constraint I mentioned earlier applies here too: validation rules
        change year to year per DATA Act requirements. So submissions validated
        under FY25 rules stay valid even after FY26 rules go live. We have to
        version the rules and keep the submission-to-rule mapping immutable.
