    - id: opening-summary-r0
      value: >-
        Yeah, that's the landscape. Though I'd separate out a couple things:


        **Agencies submitting data** — they're the ones actually filling out
        forms or pushing CSVs or calling APIs. They range from technical teams
        to non-technical staff doing manual uploads. That's the pain point on
        the input side.


        **Public consumers** — folks checking USAspending.gov to see where
        federal money went. They don't care how the sausage gets made.


        **Us internally** — grant and loan program officers, data validation
        teams, compliance folks making sure submissions meet DATA Act rules.
        We're the ones who have to live with whatever gets built.


        The integration teams matter too, yeah. But the real crux is: agencies
        need a better way to submit, we need better validation and audit trails,
        and the public needs accurate reporting without waiting weeks for data
        to flow through the old system.


        Does that match how you're thinking about the stakeholders?
