    - id: purpose-measurement-0-composition-r0
      value:
        question: How would you know if this modernized **submission system** actually
          succeeded?
        suggestions:
          - Agencies submit data 50% faster with fewer validation errors caught
            after submission
          - The audit trail shows who changed what and when, and we can trace
            discrepancies back to source
          - USAspending.gov publishes data within 2 days instead of 2-3 weeks
    - id: purpose-measurement-0-question-r0
      value: >-
        Good question. Here's what matters to me:


        **Agencies stop getting stuck in rejection loops.** Right now, FABS
        rejects a batch, they fix it, resubmit, hit a different validation error
        they didn't know about. We need: clear error messages, upfront
        validation so they know what's wrong before they submit, and fewer
        surprises on the back end.


        **We can actually audit what happened.** When a submission gets
        corrected or certified, I need to know who did it, when, what changed,
        and why. Right now that trail is fuzzy. If there's a discrepancy later,
        I can't trace it back to the agency or to a specific person's action.


        **Data flows to USAspending.gov without manual handoffs.** The current
        system requires someone to babysit the pipeline between FABS and the
        public site. If the new system publishes automatically once submissions
        are validated and certified, that's a win.


        And yeah — if agencies can submit via API *or* CSV upload depending on
        their technical capability, instead of forcing everyone into one
        channel, we see faster adoption and fewer workarounds.


        The speed-of-publication thing (weeks to days) matters, but it's
        downstream of getting submission right. Fix the submission experience
        first, and the rest gets easier.
