    - id: stakeholder-elaboration-stakeholder_008-0-composition-r0
      value:
        question: What does your team need from the submission pipeline to keep
          **USAspending.gov reporting** current and accurate?
        suggestions:
          - Timely delivery of validated submission data so we can publish
            within our SLA (e.g., within 48 hours of agency certification)
          - Clear audit trail showing what was submitted, when corrections were
            made, and which version is live — so we can answer public inquiries
            about data accuracy
          - Reliable notification when submissions are rejected or corrected, so
            we know whether published data needs to be unpublished or updated
    - id: stakeholder-elaboration-stakeholder_008-0-question-r0
      value: >-
        We need validated, certified data flowing to us automatically — no
        manual handoffs, no waiting for someone to batch files and email them
        over.


        Right now there's lag between when an agency certifies a submission and
        when it shows up on USAspending.gov. Some of that's just the pipeline
        architecture, some of it is manual steps where someone has to QA the
        data before it goes live. If the new system publishes automatically once
        a submission passes validation and gets certified, that cuts weeks down
        to days.


        We also need to know when data changes. If an agency corrects a grant
        award amount after it's already public, we need notification so we can
        update or flag the change. And we need to be able to answer questions
        when someone calls asking "why does this grant show two different
        amounts?" We pull the audit trail and say "it was submitted as X on date
        A, corrected to Y on date B, certified on date C."


        The big one though — we need PII redacted before it reaches us. Awardee
        names and addresses come through in submissions, but we can't publish
        that per Privacy Act rules. So either the submission system redacts
        before sending to us, or we have a clear data contract showing which
        fields are restricted. Right now it's fuzzy, and we've had near-misses
        on publishing sensitive information.


        Basically: clean data, automatic flow, clear audit history, and no PII
        surprises.
    - id: stakeholder-elaboration-stakeholder_008-0-extraction-r0
      value:
        responseInterpretation: USAspending.gov operators need validated, certified data
          flowing automatically with no manual handoffs or batching delays.
          Current lag between agency certification and publication (weeks)
          should compress to days once submissions pass validation and
          certification. They need automated notification when data changes so
          they can update or flag corrections publicly. They need audit trails
          to answer public inquiries about why data shows multiple versions
          (e.g., 'why does this grant show two different amounts?'). Most
          critically, they need PII redacted before data reaches them — awardee
          names and addresses cannot be published per Privacy Act rules, and the
          current fuzzy responsibility for redaction has created near-misses on
          sensitive information publication.
        role: Receive validated submission data automatically; publish to
          USAspending.gov within SLA (e.g., 48 hours of agency certification);
          maintain audit trail to answer public inquiries about data changes and
          versions; ensure PII is redacted before publication
        concerns:
          - Lag between agency certification and USAspending.gov publication
            (currently weeks); manual QA steps and pipeline architecture delays
            cause multi-week delays
          - No automated notification when agencies correct or change data; need
            visibility into what changed, when, and what version is live for
            public response
          - Cannot reliably answer public inquiries about why data shows
            different versions or amounts without audit trail access
          - PII (awardee names and addresses) may reach USAspending.gov despite
            Privacy Act restrictions; unclear data contract on which fields are
            restricted and who is responsible for redaction
          - Near-misses on publishing sensitive information due to fuzzy
            responsibility and unclear redaction handoff between submission
            system and USAspending.gov
        contradictions: []
        waitingRoomItems: []
        responseClass: answer
    - id: stakeholder-elaboration-stakeholder_009-0-composition-r0
      value:
        question: What does SAM entity validation do for the submission system, and what
          would SAM's team care most about in a modernization?
        suggestions:
          - SAM validates that recipient entities (vendors, nonprofits,
            grantees) are registered and compliant; they'd care about staying in
            the validation chain without latency increases or breaking the
            contract on what data fields trigger entity checks.
          - SAM checks entity eligibility and sanctions status; they'd want
            clear API contracts so we don't change which fields we send or how
            often we call them without coordination.
          - SAM is external — they maintain their own system and we integrate
            with it; they'd care about not adding new validation rules on our
            side that duplicate what SAM already does, or creating circular
            dependencies.
    - id: stakeholder-elaboration-stakeholder_009-0-question-r0
      value: >-
        SAM is the authoritative source for entity data — they validate that
        recipients (grantees, contractors, nonprofits, whatever) are actually
        registered, eligible, not debarred or sanctioned. When we submit data,
        we check the entity against SAM before we certify.


        The constraint we have to design around: SAM validation isn't instant.
        New registrations can take up to 48 hours to clear. So if an agency
        submits a grant to a newly registered entity, we can't certify that
        submission immediately — we're blocked waiting for SAM.


        SAM's team would care about us not creating duplicate validation logic
        on our side. They don't want us second-guessing their data or adding
        rules that conflict with what they maintain. They also want clear API
        contracts — which fields we're sending them, how often we call them,
        what we expect back. If we change the contract without coordination, we
        break their integration too.


        From our side, the key is: SAM is a dependency we don't control. The
        modernization has to acknowledge that some validation steps have latency
        we can't eliminate. We need to handle submissions that are *waiting* on
        SAM validation differently from ones that are *blocked* by validation
        failures we can control. Otherwise agencies think we're slow when really
        we're just waiting for an external system.
    - id: stakeholder-elaboration-stakeholder_009-0-extraction-r0
      value:
        responseInterpretation: "SAM is the authoritative source for entity data
          validation — they verify that recipients (grantees, contractors,
          nonprofits) are registered, eligible, and not debarred or sanctioned.
          The submission system checks entities against SAM before
          certification. SAM validation has inherent latency (up to 48 hours for
          new registrations to clear), which blocks certification of submissions
          with newly registered entities. SAM's team priorities are: (1) no
          duplicate validation logic on the submission system side that
          second-guesses or conflicts with SAM's data, (2) clear API contracts
          specifying which fields are sent, call frequency, and expected
          responses, and (3) coordination before contract changes to avoid
          breaking their integration. From the submission system perspective,
          the modernization must treat submissions waiting on SAM validation
          differently from submissions blocked by validation failures the system
          controls — otherwise agencies perceive slowness when the delay is
          actually external dependency latency."
        role: Maintain authoritative entity data (registration, eligibility,
          debarment/sanctions status) for federal financial assistance
          recipients; provide validation services to the submission system with
          defined API contract and latency expectations
        concerns:
          - SAM validation is not instant — new registrations take up to 48
            hours to clear
          - Submission system cannot certify submissions with newly registered
            entities until SAM validation completes
          - Do not want duplicate validation logic on submission system side
            that conflicts with or second-guesses SAM's data
          - Need clear API contracts specifying which fields are sent, how often
            calls occur, and what to expect in responses
          - Contract changes to API without coordination break SAM's integration
        contradictions: []
        waitingRoomItems:
          - content: Submission system must handle submissions waiting on SAM validation
              differently from submissions blocked by validation failures the
              system controls — this is an architectural requirement to manage
              external dependency latency
          - content: Some validation steps have latency the submission system cannot
              eliminate — this is a constraint on what the validation engine can
              promise to agencies
        responseClass: answer
    - id: stakeholder-elaboration-stakeholder_010-0-composition-r0
      value:
        question: What does **FPDS integration** need to work reliably within this
          modernized submission system?
        suggestions:
          - Procurement data must sync automatically when agencies submit
            financial assistance awards so FPDS has up-to-date records without
            manual re-entry.
          - Clear API contract specifying which fields map between the
            submission system and FPDS, and how often data flows so we don't
            duplicate validation logic.
          - Validation feedback that distinguishes procurement-related errors
            from financial assistance errors, so agencies know which system to
            contact for corrections.
    - id: stakeholder-elaboration-stakeholder_010-0-question-r0
      value: >-
        FPDS handles procurement — contracts, purchases, that side of federal
        spending. We handle financial assistance — grants, loans, direct
        payments. They're separate systems, but they overlap.


        Sometimes an agency submits both a grant and a procurement action for
        the same recipient or project. We need read-only access to FPDS data for
        context — to know "this entity also has procurement activity" — but
        we're not writing to FPDS. FPDS stays autonomous.


        The integration is really about not stepping on each other. If an entity
        fails validation because of a sanctions issue, that's SAM's problem, not
        FPDS's. But if there's a cross-reference between a grant and a
        procurement action that needs alignment, we need to be able to pull that
        context from FPDS without duplicating their validation rules.


        What matters: clear API contract so we know which fields we can read
        from FPDS, how often we can call without hammering their system, and
        what the response format is. We're not coordinating submissions — we're
        just checking the record for context.


        From an agency perspective, validation errors should be clear about
        which system the problem lives in. "This entity is flagged in SAM" is
        different from "This looks like procurement activity, you may need to
        check FPDS separately." We're not the single source of truth for
        everything — we just need to know our lane and point agencies to the
        right place when we're not the problem.
    - id: stakeholder-elaboration-stakeholder_010-0-extraction-r0
      value:
        responseInterpretation: "FPDS handles procurement (contracts, purchases); the
          financial assistance system handles grants, loans, direct payments.
          These are separate systems but overlap when an agency submits both a
          grant and a procurement action for the same recipient or project. FPDS
          integration requires: read-only access to FPDS data for context (to
          know 'this entity also has procurement activity') without writing to
          FPDS or duplicating FPDS validation rules. The integration is about
          not stepping on each other's toes. Clear API contract specifying which
          fields can be read, call frequency limits to avoid overloading FPDS,
          and response format are essential. Agencies need validation errors
          that clearly distinguish which system the problem lives in (e.g.,
          'entity flagged in SAM' versus 'this looks like procurement activity,
          check FPDS separately'). The submission system is not the single
          source of truth for everything—it needs to know its lane and point
          agencies to the right place when the problem is elsewhere."
        role: Maintain procurement data autonomy; provide read-only API access to FPDS
          records for context on cross-referenced grant and procurement
          activity; preserve clear system boundaries so validation errors point
          agencies to the correct system for remediation
        concerns:
          - FPDS must remain autonomous — submission system must not write to
            FPDS or duplicate FPDS validation rules
          - Need read-only access to FPDS data to check for cross-reference
            context when an entity has both grant and procurement activity
          - Unclear API contract on which FPDS fields can be read, how often the
            submission system can call without overloading FPDS, and what
            response format to expect
          - Validation error messages must distinguish between FPDS problems and
            submission system problems so agencies know which system to contact
            for corrections
          - Risk of validation rule duplication between systems if API contract
            is not clear
        contradictions: []
        waitingRoomItems:
          - content: Read-only access pattern for external system integration—submission
              system queries FPDS for context without modifying data, no API
              writes to FPDS
          - content: Validation error categorization requirement—errors must be labeled by
              which system owns the problem so agencies can route corrections
              correctly
        responseClass: answer
    - id: stakeholder-elaboration-stakeholder_011-0-composition-r0
      value:
        question: What specific **audit trail requirements** must the modernized system
          satisfy to pass your compliance reviews?
        suggestions:
          - Every submission, correction, and certification action needs to be
            logged with user identity and timestamp — and those logs have to be
            immutable and queryable for audit inquiries.
          - "We need to trace the chain of custody for data corrections: who
            submitted what, when, what feedback they received, and what they
            resubmitted in response."
          - Auditors ask us to prove that published data matches what agencies
            actually certified — right now we can't reliably answer that
            question because the audit trail is spread across email,
            spreadsheets, and multiple systems.
    - id: stakeholder-elaboration-stakeholder_011-0-question-r0
      value: >-
        All of those, honestly. It's (a) + (b) + (c) combined.


        Every action — submission, correction, certification — has to be logged
        with who did it, when, and what changed. And that log can't be altered
        retroactively. If an auditor asks "show me the chain of custody for this
        grant award," I need to pull a report and say "submitted by Jane on Sept
        1, rejected for entity mismatch on Sept 2, resubmitted by Jane on Sept
        3, certified by Bob on Sept 5."


        Right now that information is scattered. Submission timestamps might be
        in FABS, email threads have the feedback, a spreadsheet tracks
        corrections, and certification happens in another system entirely.
        Auditors ask for the story and I have to reconstruct it from fragments.


        The modernized system has to make that reconstruction automatic. One
        authoritative log. If there's ever a question about what was published
        on USAspending.gov versus what was actually certified, I pull the audit
        trail and we have the answer.


        Also — the log has to be tamper-proof. Someone can't go back and change
        a timestamp or hide who made a correction. And auditors need to be able
        to query it themselves without needing DBA access or calling me to pull
        a database snapshot.


        It's not just nice-to-have governance. It's regulatory requirement. If
        we can't prove the chain of custody, we fail the audit.
    - id: stakeholder-elaboration-stakeholder_011-0-extraction-r0
      value:
        responseInterpretation: The respondent confirmed all three audit trail
          requirements (a + b + c combined). Every action—submission,
          correction, certification—must be logged with identity, timestamp, and
          what changed. The log must be immutable and tamper-proof. The
          respondent emphasized that audit trail information is currently
          scattered across FABS, email, spreadsheets, and multiple systems,
          making reconstruction manual and unreliable. The modernized system
          must create one authoritative log so that auditors can independently
          query it to verify the chain of custody for any submission and confirm
