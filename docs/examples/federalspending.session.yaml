    - id: scope-constraint-composition-r0
      value:
        question: What **hard constraints** (budget, timeline, regulatory, or technical)
          must this modernization work within?
        suggestions:
          - Statutory deadlines for validation feedback and corrections tied to
            DATA Act compliance windows
          - Limited budget or staffing to manage parallel operation of old and
            new systems during transition
          - Integration APIs from SAM and FPDS have fixed SLAs and cannot be
            modified to match our submission timeline
    - id: scope-constraint-question-r0
      value: >-
        The big ones:


        **DATA Act compliance rules change every fiscal year.** We have to
        support submissions under the rules in effect at submission time, not
        retroactively apply new rules. That's non-negotiable from a regulatory
        perspective.


        **30-day correction window is hard.** Agencies have 30 days from
        submission to fix rejections before public reporting deadlines hit. If
        we're slow on feedback, we eat into that window. This isn't a
        nice-to-have timeline — it's statutory.


        **SAM validation latency is real.** New entity registrations take up to
        48 hours. We can't speed that up; we have to design around it.
        Submissions waiting on SAM validation can't be certified immediately,
        but we can't leave agencies hanging either.


        **Submission files are huge.** Agencies submit files with millions of
        records, 500MB+. Bulk validation can't block the API. We need async
        processing, not synchronous validation that locks up the submission
        endpoint.


        **Agency technical maturity varies wildly.** Some can do API
        integration; others need CSV upload. We have to support both paths
        without building two separate systems.


        And yeah — immutable audit trail is regulatory, not optional. If we
        can't prove the chain of custody, we fail compliance review.


        Those are the walls. Everything else is solvable with good design.
