    - id: stakeholder-elaboration-stakeholder_005-0-composition-r0
      value:
        question: Walk me through what **agency workflow operators** do day-to-day when
          submissions need validation feedback or corrections.
        suggestions:
          - We receive validation error reports, triage them by category
            (entity, amount, compliance), assign to program teams, track
            corrections in a shared spreadsheet, and resubmit within our 30-day
            window.
          - Our operators monitor the submission portal, pull down rejection
            notices, document what failed for each agency, coordinate with their
            IT staff on fixes, and manage the resubmission queue—but we have no
            centralized way to track what's been corrected.
          - We handle intake from multiple agencies, validate the data ourselves
            before official submission, but when the system rejects it, we're
            unclear whether the error is in our mapping or their data, which
            delays resolution.
    - id: stakeholder-elaboration-stakeholder_005-0-question-r0
      value: >-
        We receive validation feedback from the system — error reports,
        rejection notices — and have to get that back to the right people in
        each agency. Some agencies have dedicated data teams; others, it's a
        grants manager who's juggling five other things.


        We triage by urgency and by type: entity validation issues (names,
        addresses don't match SAM), amount discrepancies, compliance rule
        violations. Then we assign to the program team or loop in the agency
        directly with "here's what's wrong, here's what you need to fix."


        The real problem: we have no centralized tracking. Right now it's email,
        spreadsheets, sometimes a shared drive nobody can quite find. If an
        agency submits a correction, we don't have a clean way to confirm it
        actually made it into the system versus sitting in a queue somewhere.
        And if multiple agencies are in flight at the same time — which they
        always are — we lose visibility into who's on track to make the 30-day
        deadline and who's going to miss it.


        We also get questions like "Did we already resubmit that grant?" or "Is
        this a new rejection or the same one from last week?" We should be able
        to pull a submission history and see exactly what was submitted, when,
        and what feedback was given. Right now that requires digging through
        emails or calling someone.


        A consolidated submission tracking system with clear error attribution —
        that would cut our admin overhead in half.
