    - id: scope-contrast-1-composition-r0
      value:
        question: When SAM validation blocks certification, should the submission system
          queue submissions awaiting entity data, or should **responsibility for
          queuing** rest with your workflow operators?
        suggestions:
          - The submission system should queue submissions automatically and
            notify us when SAM validation completes
          - We (workflow operators) should manage the queue—hold submissions in
            our tracking system until we confirm SAM cleared them
          - "We need both: the system queues automatically, but we retain
            visibility and can manually override or expedite"
    - id: scope-contrast-1-question-r0
      value: >-
        I'd go with (c) — the system queues automatically, but we need
        visibility and override capability.


        Here's why: if the system just queues invisibly and notifies when it's
        done, agencies get confused about what happened to their submission.
        They see it accepted but not certified, and they don't know if it's
        pending SAM or sitting in some black box. We'd get calls asking "where's
        my data?"


        But if *we* manage the queue manually in a separate tracking system,
        we're back to spreadsheets and email. We'd lose the single source of
        truth.


        So the system should:

        - Accept the submission

        - Detect the SAM validation is pending

        - Queue it with a clear status: "Waiting on entity validation from SAM,
        expected by [date]"

        - Notify the agency: "Your submission is accepted and queued; we're
        validating your entities with SAM"

        - Notify us when SAM clears or rejects the entity

        - Let us see the queue and manually intervene if needed — like "SAM is
        taking too long, let me escalate" or "reject this one, the entity isn't
        going to clear"


        That way agencies know what's happening, we have visibility and control,
        and the system isn't a black box.
    - id: scope-contrast-1-extraction-r0
      value:
        responseInterpretation: "The respondent chose option (c): the submission system
          should queue submissions automatically when SAM validation is pending,
          provide clear status messaging to agencies about the reason for
          queueing and expected timeline, notify both the agency and workflow
