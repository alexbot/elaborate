        responseClass: answer
    - id: scope-contrast-2-composition-r0
      value:
        question: Should the submission system own the **SLA for delivering validation
          feedback** to agencies, or does that belong to workflow operators and
          agency processes?
        suggestions:
          - "In scope: submission system must deliver feedback within a defined
            window (e.g., 24-48 hours) so agencies have actionable time to
            correct before the 30-day deadline"
          - "Out of scope: submission system delivers feedback as soon as
            validation completes; workflow operators and agencies own the SLA
            for receiving and acting on it"
          - "Hybrid: submission system owns technical delivery (feedback
            generated and queued); workflow operators own the SLA for routing it
            to agencies"
    - id: scope-contrast-2-question-r0
      value: >-
        It's (a) — the submission system owns the SLA for delivering feedback.


        Here's the thing: if we say "we'll validate as fast as we can and hand
        it off to operators," we're kicking the accountability down the line.
        Operators get swamped, feedback sits in an inbox for a week, agencies
        miss their window. Then auditors ask "why did this agency miss the
        correction deadline?" and we don't have a good answer.


        The system needs to commit to: validation feedback reaches the agency
        within 2-3 business days of submission. Not "validation completes," but
        "feedback is delivered." That means the system has to handle
        notifications — email, API callback, whatever the submission method was.


        If validation takes 30 minutes, feedback should be out same day. If
        validation is queued behind a backlog, the system tells the agency "we
        received your submission, validation is queued, you'll hear from us by
        [date]" — not silence.


        That SLA is how we prove to auditors that agencies had time to correct.
        It's also how we keep them from panicking and calling us every day
        asking "where's my feedback?"


        Workflow operators still have a role — they triage and route feedback to
        the right people in each agency. But that's operational, not
        SLA-critical. The system commits to delivery; operators commit to
        routing.
    - id: scope-contrast-2-extraction-r0
      value:
        responseInterpretation: The submission system owns the SLA for delivering
          validation feedback to agencies. Feedback must reach agencies within
          2-3 business days of submission, not just when validation completes.
          The system must handle notifications (email, API callback, matching
          the submission method). If validation completes same day, feedback
          goes out same day. If validation is queued, the system sends immediate
          acknowledgment with expected delivery date. This SLA is critical for
          audit accountability—it proves agencies had actionable time to correct
          before the 30-day deadline. Workflow operators handle triage and
          routing (operational, not SLA-critical), but the system commits to
          delivery.
