      value: >-
        Grants administrators are the ones managing the actual grant programs —
        they know what data should be there, they track what's been awarded, and
        they're responsible for getting that data into the submission system
        correctly.


        They submit grant award data (who got the money, what it was for,
        conditions), and when validation rejects something, they have to figure
        out what's wrong and fix it. Right now they're doing a lot of manual
        legwork — pulling data from their own systems, reformatting it,
        uploading it, waiting days for feedback on why it failed, then starting
        over.


        They also have their own internal reporting deadlines that don't always
        line up with our statutory windows. So if we're slow on validation
        feedback, they miss *their* deadlines even if we technically meet ours.


        And they need to be able to explain to auditors what they submitted and
        when — if there's a question about a grant award six months later, they
        need to show the submission history and any corrections they made.


        The key thing: they're not IT. They're program managers. They need the
        system to be straightforward, and they need feedback fast so they can
        course-correct.
