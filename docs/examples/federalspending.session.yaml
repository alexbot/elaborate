    - id: goal-refinement-goal_004-clarify-0-composition-r0
      value:
        question: When you say agencies need to submit financial data through both API
          and CSV, what would each submission path actually do?
        suggestions:
          - Grants administrators use CSV uploads for bulk corrections monthly;
            loans teams use the API to push data continuously as payment
            transactions occur.
          - CSV for smaller agencies without technical staff; API for large
            agencies integrating FABS into their existing financial systems.
          - Both paths validate against the same rules and produce the same
            audit trail, but CSV is a one-off file upload while API supports
            real-time integrations.
    - id: goal-refinement-goal_004-clarify-0-question-r0
      value: >-
        It's closer to (b), but with a wrinkle.


        **CSV path**: Smaller agencies, regional offices, maybe grant managers
        who don't have a dedicated IT team. They upload a file, get told what's
        wrong, fix it locally, upload again. Human-readable feedback. They might
        do this monthly or quarterly depending on their grant cycle.


        **API path**: Larger agencies or ones with mature financial systems.
        They integrate directly — could be real-time as transactions happen, or
        daily batch syncs from their accounting system. Less friction, fewer
        manual steps.


        But here's the thing — both have to validate against the *same* rules
        and produce the same audit trail. I don't want two different validation
        engines. And both need to handle the same correction workflows. If an
        API submission gets rejected, the agency needs clear feedback about what
        to fix, just like a CSV user would.


        The difference is operational, not technical. One's interactive (upload,
        feedback, retry), one's programmatic (push, callback, update). Same
        underlying validation and certification logic.


        Does that land?
