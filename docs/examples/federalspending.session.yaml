    - id: scope-confirmation-r0
      value: >-
        This is solid. One thing to add under **Constraints**:


        **Versioned validation rules must persist.** Not just "rules change year
        to year" — but once a rule version is live, we can't modify it
        retroactively. FY25 rules stay locked. If there's a bug in FY25
        validation or a rule clarification needed, we either patch it forward to
        FY26 or we accept that FY25 submissions were validated under that rule
        set, period. This affects how you architect the rules engine — you're
        not maintaining one set of rules that evolve; you're maintaining
        versioned snapshots.


        That's the immutability constraint that shapes the technical design.
        Worth calling out explicitly.


        Everything else tracks.
