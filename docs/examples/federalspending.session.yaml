    - id: goals-confirmation-r0
      value: >-
        That's sharp. I'd add one more thing to goal #1 — the validation rules
        themselves change with each fiscal year per DATA Act compliance. So
        "rapid error detection" has to account for the fact that what's valid in
        FY25 might not be valid in FY26.


        Agencies need to know *which version* of the rules they're validating
        against at submission time, and we need to keep that versioned so
        submissions validated under FY25 rules stay valid even after FY26 rules
        go live. Otherwise we'll get agencies complaining their data passed
        validation in September but fails in October because the rules changed.


        That's a lurking constraint that affects how you architect the
        validation engine.


        Otherwise yeah, those four goals work.
