    - id: opening-summary-r0
      value: Yeah, that's right. The city's talking about closing it because foot
        traffic has dropped. I don't want to see that happen — the library's
        been part of this neighborhood for a long time. I want to figure out how
        to bring people back.
    - id: opening-confirmation-classification-0-r0
