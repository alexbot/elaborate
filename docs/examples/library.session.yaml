    - id: purpose-measurement-0-composition-r0
      value:
        question: How would you know if you've brought people back to the **library
          branch** successfully?
        suggestions:
          - Weekly foot traffic counts increase to X visitors per week,
            sustained over 3 months
          - People are using the library regularly for their own
            purposes—homework, events, browsing—not just visiting once
          - The city sees enough activity that closing the branch no longer
            makes financial sense
    - id: purpose-measurement-0-question-r0
      value: >-
        Honestly, I think the city's going to measure it by foot traffic numbers
        — that's what they track, and that's what matters for the closure
        decision. So yeah, we'd need visitor counts to go up enough that closing
        it stops making sense to them financially.


        But I'm not actually sure what number would be "enough." The city hasn't
        told me their threshold. And I'm a little worried that just getting
        bodies through the door isn't the same as success — you could give away
        free coffee and pack the place, but that doesn't mean people actually
        *need* the library or that it's solving a real problem for them.


        So I guess I have two different success measures fighting each other:
        the one the city cares about (foot traffic), and the one I think
        actually matters (people getting something out of being there). I'm not
        sure how to thread that needle.
    - id: purpose-measurement-0-extraction-r0
      value:
        purpose: null
        advantage: null
        measurement: "Two competing measures: (1) foot traffic numbers high enough that
          the city no longer finds closure financially justified, but the
