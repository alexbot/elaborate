    - id: goal-seed-extraction
      value:
        goals:
          - title: Establish sustainable library use rooted in genuine patron needs
            description: Identify and activate the actual purposes that draw people to the
              library—homework, events, browsing, community gathering—and build
              recurring visits around those needs rather than temporary
              activity. Success means people returning because the library
              serves something they want to do, not because of novelty or
              external pressure.
            rationale: "The measurement insight flags a critical gap: foot traffic alone
              won't save the branch if it's volatile or artificial. The city's
              closure decision is based on low traffic, but the respondent's
              advantage hinges on demonstrating real, sustained demand. Without
              understanding what purposes bring people back, traffic gains will
              collapse once any campaign momentum fades. This goal bridges
              measurement (sustainable traffic) with purpose (why people
              actually come)."
          - title: Map the city's foot traffic threshold and baseline metrics
            description: Determine the minimum traffic level the city needs to see to
              reverse the closure decision, understand the current baseline, and
              identify what traffic patterns (frequency, timing, user types) the
              city actually measures. This establishes concrete success criteria
              and reveals what 'winning' looks like operationally.
            rationale: The measurement statement explicitly notes the city hasn't shared the
              threshold. Operating blind on this wastes effort—campaigns might
              hit 'high traffic' by campaign standards but miss the city's
              actual bar. Knowing the threshold also reveals whether the goal is
              achievable with the library's existing draw or whether the library
              needs to fundamentally change what it offers.
          - title: Clarify the target returning-visitor profile and retention strategy
            description: Determine who should return to the library—former regular patrons,
              new community members, specific demographics with unmet needs—and
              design retention mechanics that keep them coming back. Avoid
              treating 'bringing people back' as a undifferentiated mass goal.
            rationale: "The measurement statement raises but leaves unresolved: returning
              visitors could be the same people who stopped coming, completely
              new people, or a mix. Each profile requires different tactics and
              carries different risk. Former patrons may have left for reasons
              the library can't fix; new users might have less loyalty.
              Clarifying this profile lets the strategy be realistic about
              sustainability and prevents investing in the wrong audience."
        drainedWaitingRoomIds: []
    - id: goal-seed-present-r0
      value: >-
        These feel right, but I want to flag something: I'm not sure goals (a)
        and (c) are actually compatible with each other, or with what the city
        needs.


        Goal (a) is about finding genuine needs and building around those. Goal
        (c) is about targeting a specific returning-visitor profile and keeping
        them coming back. But I don't know yet if the people who *used* to come
        are the same people the *neighborhood needs* right now. Those could be
        completely different groups with different needs.


        Like — the library used to be quiet study space, mostly older folks. But
        maybe what the neighborhood actually needs now is a children's program
        hub, or job training, or a warm place for homeless folks in winter.
        Those are all legitimate needs, but they'd bring very different visitors
        and require different programming. I haven't figured out which one we're
        actually trying to serve.


        So before I sign off on these goals, I need to know: are we trying to
        restore what the library *was*, or figure out what it *should be* for
        the neighborhood now? Because that changes everything about what
        "genuine patron needs" means and who the "target returning visitor" is.


        Does that make sense?
