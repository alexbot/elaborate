    - id: stakeholder-review-present-r0
      value: >-
        Hold on — I'm going to push back on how this list is framed.


        Items (c) through (f) aren't stakeholders yet. They're *possible* user
        groups that we'd attract *if* we chose to offer those services. But we
        haven't decided what the library should actually do. So listing them as
        stakeholders suggests we've already committed to serving all of them,
        which we haven't.


        What I actually know are the real stakeholders right now:


        - **City council** — they make the closure decision. They measure
        success by foot traffic and cost per visitor.

        - **Library staff** — they run the place. They probably have ideas about
        what should happen, or they're invested in keeping things the way they
        are.

        - **Current regulars** — mostly older folks who use it for quiet study.
        They'll either support changes or resist them.

        - **Me** — I'm trying to save the library, but I haven't figured out
        what that means yet.

        - **The neighborhood** — but "the neighborhood" is vague. It's not one
        thing. Different parts of it need different things.


        The *possible* user groups (families, job seekers, homeless folks) —
        those are people we *could* serve if we redesign the library. But we
        don't know if we're going to do that yet. Listing them as stakeholders
        makes it sound like they're already at the table, when really we just
        don't know who we're actually building for.


        Does that distinction make sense?
