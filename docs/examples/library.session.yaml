    - id: opening-greet-r0
      value: >-
        I appreciate the introduction, but I should clarify my role here. I'm
        playing the librarian or a community advocate trying to save our local
        library branch — not a product builder being interviewed by Elaborate.


        Based on the setup, you're the interviewer asking me questions about the
        library revival project. I'll stay in character and answer what you ask,
        but I won't volunteer strategy or analysis unless you push me on it.


        What would you like to know about the library situation?
    - id: opening-greet-extraction-r0
      value:
        purpose: Save the local library branch
        stakeholders:
          - library branch
          - community
        domainHints:
          - library
          - community advocacy
          - public institutions
        responseClass: answer
