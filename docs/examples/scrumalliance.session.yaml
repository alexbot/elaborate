    - id: purpose-purpose-0-composition-r0
      value:
        question: What **problem** does this community platform need to solve for Scrum
          Alliance users?
        suggestions:
          - Fragmented certification tracking across multiple roles and training
            providers
          - Users lack a central place to find peers, share experiences, and get
            answers about Scrum practices
          - Difficulty connecting learners with mentors or resources matched to
            their certification level
    - id: purpose-purpose-0-question-r0
      value: >-
        Good question. It's really a few problems tangled together.


        Right now, members scattered across different systems — their training
        history lives one place, certification records another, maybe some
        community contributions elsewhere. There's no single view of "here's who
        I am as a practitioner." For recruiters trying to find qualified people,
        it's painful — no centralized talent pool. And trainers? They're posting
        courses all over the place with no way to showcase them or build
        credibility within the community.


        The bigger thing though: Scrum Alliance doesn't have a modern home for
        its community. We want members to actually engage — find each other, see
        what certifications matter, understand what they need to stay current,
        discover training opportunities. Right now that's scattered and
        fragmented.
    - id: purpose-purpose-0-extraction-r0
      value:
        purpose: Members scattered across different systems with no single view of their
          practitioner identity. Training history, certification records, and
          community contributions are fragmented. The platform should be a
          modern central home where members can find each other, see what
          certifications matter, understand what they need to stay current, and
          discover training opportunities.
        advantage: null
        measurement: null
        responseInterpretation: "The respondent identified three interconnected
          problems: (1) fragmented certification tracking across multiple
          systems with no unified practitioner profile, (2) lack of a central
          place for members to find peers and engage with the community, and (3)
          trainers scattered across platforms with no way to showcase courses or
          build credibility. They emphasized the larger problem: Scrum Alliance
          lacks a modern community home. They added two stakeholder concerns not
          in the original suggestions — recruiters need a centralized talent
          pool to find qualified people, and trainers need a platform to
          showcase courses and build credibility within the community."
        contradictions: []
        responseClass: answer
    - id: purpose-advantage-0-composition-r0
      value:
        question: What **advantage** does consolidating member profiles and
          certifications into one system create compared to your current
          fragmented setup?
        suggestions:
          - Members save time by updating credentials once instead of across
            multiple platforms, reducing duplicate effort and sync errors.
          - Community leaders can identify expertise gaps and skill patterns
            across the membership to guide training priorities.
          - Members discover relevant peers and training aligned to their career
            path instead of stumbling onto them randomly.
    - id: purpose-advantage-0-question-r0
      value: >-
        All three matter, honestly, but let me frame it differently.


        For members: one place to own their professional identity within Scrum
        Alliance. Update once, it's live everywhere. People can actually see
        "okay, I'm certified in X, I need to renew in Y, here's what training
        gets me there." That clarity changes behavior — right now people don't
        know they're slipping out of compliance.


        For the Alliance itself: we get a real picture of who we are as a
        community. What certifications are trending, where the gaps are, where
        trainers should focus. You can't make good decisions without that data.


        For recruiters: they get a vetted talent pool instead of guessing. And
        for trainers, they finally have a legitimate stage — their courses live
        in the Alliance ecosystem, not scattered across their own sites.


        The real win is member stickiness. Right now, people get certified and
        disappear. We want them to stay engaged, renew on time, invest in the
        community.
    - id: purpose-advantage-0-extraction-r0
      value:
        purpose: null
        advantage: Members own their professional identity in one place, update once and
          it's live everywhere, gaining clarity on certification status and
          renewal pathways that changes behavior. Alliance gets real data on
          trending certifications and gaps to guide training focus and
          decision-making. Recruiters access a vetted talent pool. Trainers get
          a legitimate stage in the Alliance ecosystem. Member stickiness
          increases — people stay engaged and renew on time instead of getting
          certified and disappearing.
        measurement: null
        responseInterpretation: "The respondent affirmed all three suggestions (member
          time savings, gap identification for leaders, peer discovery) but
          reframed the advantages into four stakeholder perspectives: (1)
          Members gain clarity on compliance status and renewal pathways, which
          changes their behavior; (2) The Alliance itself gets data on
          certification trends and gaps to guide training priorities and
          decisions; (3) Recruiters gain access to a vetted talent pool instead
          of guessing; (4) Trainers finally have a legitimate platform for their
          courses within the Alliance ecosystem. The core win is member
          stickiness — preventing the pattern where certified members disengage
          and fail to renew on time."
        contradictions: []
        responseClass: answer
    - id: purpose-measurement-0-composition-r0
      value:
        question: How would you know if this platform succeeded—what **measurable
          changes** would you see?
        suggestions:
          - "Member engagement metrics: login frequency, profile completion
            rates, or time spent exploring certifications and training"
          - "Certification behavior: renewal rates increasing, members
            discovering and pursuing new certifications they didn't know about"
          - "Data quality for the Alliance: trends in which certifications are
            popular, which gaps appear across the membership, better insight
            into training demand"
    - id: purpose-measurement-0-question-r0
      value: >-
        Renewal rates — that's the hard metric. Right now we're probably losing
        people between cycles because they don't remember they need to renew, or
        they don't know what SEUs they need to hit. If we see renewals go up, we
        know it's working.


        Trainer adoption matters too. If CSTs are actually using the platform to
        list courses instead of their own sites, that tells us we've built
        something they trust and want to be part of.


        And recruiter traction. Are they finding people? Are the job postings
        getting real applications from qualified candidates? If that loop works,
        the whole thing validates.


        But yeah — engagement metrics are secondary. Renewal rate is the north
        star for us. Everything else supports that.
    - id: purpose-measurement-0-extraction-r0
      value:
        purpose: null
        advantage: null
        measurement: Renewal rates increasing — members renewing at higher frequency
          instead of dropping between cycles due to forgetting renewal needs or
