    - id: stakeholder-elaboration-stakeholder_001-0-composition-r0
      value:
        question: What matters most to **Scrum Alliance community platform users** when
          they're managing their professional identity in the Scrum space?
        suggestions:
          - Having one place where I can see all my certifications, training
            history, and renewal deadlines without checking multiple systems
          - Finding other practitioners with specific expertise or experience so
            I can connect with peers working on similar challenges
          - Understanding what certifications are relevant to my role and what I
            need to do to stay current in the field
    - id: stakeholder-elaboration-stakeholder_001-0-question-r0
      value: >-
        All three, but in order. First — yeah, one place to see everything.
        That's table stakes. Second is the peer discovery thing, but honestly
        that's softer. Not everyone wants community; some just want their
        credentials managed cleanly.


        What really matters is clarity on what they need to do to stay current.
        Most members don't know the renewal cycle works. They don't know SEUs
        are a thing. They renew their cert and think they're done, then two
        years later they're shocked it expired. If we surface "you need X SEUs
        in the next 18 months, here's what training counts," that changes the
        game. That's the behavior shift we're after.
    - id: stakeholder-elaboration-stakeholder_001-0-extraction-r0
      value:
        responseInterpretation: "All three suggested priorities matter to Scrum Alliance
          community platform users, ranked in order: (1) One place to see all
