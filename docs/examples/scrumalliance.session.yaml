    - id: goal-seed-extraction
      value:
        goals:
          - title: Establish member identity as the system of record
            description: Create a single authoritative source where members maintain their
              professional identity (certifications, training history, community
              contributions) once, eliminating fragmentation across systems and
              ensuring data consistency everywhere.
            rationale: "Solves the core problem: scattered data across systems. Enables the
              'update once' behavior change described in advantage. Foundation
              for all downstream outcomes (clarity, discovery, stickiness)."
          - title: Enable trainer participation as a legitimate ecosystem function
            description: Give trainers a platform to list and publish courses within
              Alliance quality gates, positioning trainer contributions as
              integral to the ecosystem rather than external competitors.
            rationale: Addresses the second stakeholder value (trainers get a stage).
              Trainer adoption (measured by CST course listings + publication
              compliance) is a concrete adoption metric. Shifts trainers from
              outside the system to inside it.
          - title: Drive member engagement through certification clarity and renewal
              behavior change
            description: Surface certification status, renewal pathways, and training
              opportunities in ways that prompt members to stay current, renew
              on time, and maintain platform engagement instead of departing
              after certification.
            rationale: Directly targets member stickiness increase and behavior change (the
              outcome that 'changes behavior'). Moves beyond feature
              availability to behavioral outcomes. Measurable through retention
              and renewal rates.
