    - id: goal-refinement-goal_004-clarify-0-composition-r0
      value:
        question: When recruiters find a **qualified candidate** on the platform, what
          specifically needs to happen for that to feel reliable to you?
        suggestions:
          - Recruiters can filter by active certifications and verify current
            status without leaving the platform — no cross-checking against
            external systems.
          - Member profiles show training completion dates and renewal deadlines
            so recruiters know who's investment-ready versus who's
            certification-lapsed.
          - A candidate match shows up consistently in search results because
            their profile data stays in sync across all systems — no stale or
            conflicting information.
    - id: goal-refinement-goal_004-clarify-0-question-r0
      value: >-
        All three matter, but the core thing is: the recruiter knows the person
        is actually certified and current. Not expired, not lapsed, not "was
        certified three years ago." That's the trust issue.


        So yeah — they can see active certifications, renewal dates, what
        training they've completed. And it's real data, not stale. If someone's
        profile says they're CSM-certified, that status syncs with our actual
        certification records, not just what they claimed on their profile.


        Beyond that though — and this gets at something I haven't mentioned yet
        — we need to make sure members actually *want* to be found by
        recruiters. Not everyone does. Some people just want to be part of the
        community, not job hunting. So there's a visibility control. Members opt
        in to being searchable by recruiters, not the other way around. That's
        how we protect privacy and trust.
    - id: goal-refinement-goal_004-clarify-0-extraction-r0
      value:
        responseInterpretation: The stakeholder confirms all three suggestions matter
          (recruiters filtering by active certifications and verifying current
          status without external cross-checking; member profiles showing
          training completion dates and renewal deadlines; candidate matches
          appearing consistently because profile data stays in sync across
          systems). The core trust issue is that recruiters must know a person
          is actually certified and current — not expired, lapsed, or
          historically certified. This requires active certification visibility,
          renewal dates, training completion records, AND real-time data sync
          with actual certification records (not self-reported claims).
          Additionally, members must have the ability to opt in to recruiter
          visibility — not everyone wants to be searchable, and privacy/trust
          requires members control whether they appear in recruiter searches.
        title: Connect recruiters to qualified talent reliably
        description: Recruiters can find and filter candidates by active, current
          certifications (not expired or lapsed). Member profiles display
          training completion dates and renewal deadlines. Candidate data syncs
          with actual certification records to ensure accuracy. Members opt in
          to recruiter visibility; not all members choose to be searchable.
        rationale: Reliable recruiter access to qualified talent increases trust in the
          platform as a source of vetted candidates. Member opt-in for recruiter
          visibility protects privacy and respects that not all members are
          job-seeking, strengthening member trust in the ecosystem.
        contradictions: []
        waitingRoomItems:
          - content: Members opt in to being searchable by recruiters, not the other way
              around. Visibility control required to protect privacy and trust.
        responseClass: answer
