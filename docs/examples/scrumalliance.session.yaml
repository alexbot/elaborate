        suggestions:
          - A searchable directory of members filtered by current certifications
            and renewal status, so they can quickly identify qualified
            candidates
          - Confidence that certification records are verified by the Alliance,
            not self-reported — so they know the credentials are legitimate
          - Integration with their existing hiring workflows, or at minimum, a
            way to export candidate lists with certification details
    - id: stakeholder-elaboration-stakeholder_004-0-question-r0
      value: >-
        A and B, definitely. They need to search by active certs and know those
        certs are real — verified by us, not just claims on a profile. That's
        the whole trust thing.


        C — integration with their workflows — I'm not sure that's on us to
        solve. Recruiters have their own ATS systems. We just need to make it
        easy for them to find people and contact them through the platform. If
        they want to pull data into their own systems, that's their problem.


        One thing though — they also need to know the candidate actually *wants*
        to be contacted. Remember, members opt in to recruiter visibility. So a
        recruiter might find someone in search results, but they can only
        contact them if that member said yes to being searchable. That protects
        member privacy and keeps the platform from feeling like a spam vector.
    - id: stakeholder-elaboration-stakeholder_004-0-extraction-r0
      value:
        responseInterpretation: Recruiters need to search by active certifications and
