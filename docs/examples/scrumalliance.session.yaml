    - id: stakeholder-elaboration-stakeholder_005-0-composition-r0
      value:
        question: What would **certified practitioners** most want from a platform that
          centralizes their certification and training information?
        suggestions:
          - Easy way to see which certifications they hold, when they expire,
            and what they need to do to renew without surprises
          - Access to training courses and resources that help them stay current
            and discover new certifications relevant to their career
          - A single place where their professional identity is visible to
            potential employers and within the Scrum Alliance community
    - id: stakeholder-elaboration-stakeholder_005-0-question-r0
      value: >-
        A is the baseline — they need clarity on what they've got and what's
        expiring. No surprises.


        B and C are connected. They want to stay current *and* be visible when
        they're ready. But visibility is their choice — they control whether
        recruiters can see them. So it's not "employers can always find me,"
        it's "when I opt in, my professional identity is there and current."


        The thing that ties it together though: they need *proof* that they're
        current. Not just their own word. When they show their profile to a
        recruiter or a prospective client, that certification status is backed
        by the Alliance. That's what makes the profile credible.
    - id: stakeholder-elaboration-stakeholder_005-0-extraction-r0
      value:
        responseInterpretation: "Certified practitioners need three things in order: (A)
          baseline clarity on what certifications they hold, expiration dates,
          and renewal requirements without surprises; (B) and (C) together —
          they want to stay current and control their visibility. Visibility is
          opt-in; they choose whether recruiters can find them. The critical
          element that ties it together is proof: when they show their profile
          to a recruiter or prospect, the certification status must be backed by
          the Alliance, not self-reported. That's what makes the profile
          credible."
        role: Professional seeking to maintain current certifications, control
          visibility in the job market, and prove certification status to
