    - id: opening-greet-r0
      value: >-
        Thanks for the setup. I'm ready to go, but I should clarify my role
        here.


        I'm playing a **Scrum Alliance community platform stakeholder** being
        interviewed about a real project — not using the eli elicitation tool.
        The system context describes the project, hidden constraints I should
        only reveal when asked, and how I should simulate a real person
        (concrete, brief, uncertain where appropriate).


        So: treat this as a **stakeholder interview**, not an eli session. Ask
        me about the platform, the users, the problem, certification workflows —
        whatever you need to understand. I'll answer naturally and reveal
        constraints only when they're genuinely relevant to your question.


        What would you like to know?
