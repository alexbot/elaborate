    - id: stakeholder-elaboration-stakeholder_006-0-composition-r0
      value:
        question: What does **Scrum Alliance staff** need to oversee or control about
          course listings and certifications on this platform?
        suggestions:
          - Approve courses before they go live to maintain quality standards
          - Monitor which certifications are trending to inform training strategy
          - Verify that trainer credentials and course content meet Alliance
            standards
    - id: stakeholder-elaboration-stakeholder_006-0-question-r0
      value: >-
        A is mandatory. Every course listing gets reviewed and approved by staff
        before it's published. We can't have random stuff claiming to be Scrum
        Alliance training. That destroys credibility.


        B — yeah, we need that data. Trending certs tell us where member demand
        is and where we should push trainers to develop new offerings.


        C — verifying trainer credentials and content — that's part of the
        approval process in A. We know who CSTs are, we verify they're in good
        standing. Content review happens when they submit a course.


        The other piece that matters: we need to be able to manage the
        certification lifecycle itself. Renewals are time-gated — every two
        years — with specific SEU requirements. Staff needs visibility and
        control over that process. Members can't just renew whenever; there's a
        window, there are requirements.
    - id: stakeholder-elaboration-stakeholder_006-0-extraction-r0
      value:
        responseInterpretation: Scrum Alliance staff must approve all course listings
          before publication to maintain credibility and prevent unauthorized
          training claims. They need data on trending certifications to
          understand member demand and guide trainer development priorities.
          Trainer credential verification and content review are part of the
          approval process — staff knows who CSTs are and verifies their
          standing and course content during submission. Additionally, staff
          must manage the certification lifecycle itself, including the two-year
          renewal windows and SEU requirements. Members cannot renew outside the
          designated timeframe or without meeting specific requirements.
        role: Quality gatekeeper for course listings, certification lifecycle
          administrator, and strategic data consumer on training trends
        concerns:
          - Must prevent unauthorized course listings that claim Scrum Alliance
            training and damage credibility
          - Need visibility and control over certification renewals, including
            time-gated windows and SEU requirement enforcement
          - Need data on which certifications are trending to inform training
            strategy and guide trainers toward developing new offerings
          - Must verify trainer credentials and content meet Alliance standards
            as part of the approval process
