    - id: purpose-advantage-0-composition-r0
      value:
        question: What **advantages** would this app have over how residents currently
          find recycling options?
        suggestions:
          - Saves time by showing nearby centers on a map instead of searching
            online or calling ahead
          - Reduces waste by showing what each center accepts so people don't
            bring rejected materials
          - Eliminates the need to coordinate pickups separately for large items
            like appliances
    - id: purpose-advantage-0-question-r0
      value: >-
        I think the biggest advantage is consolidation. Right now residents are
        stuck juggling multiple sources — some call the city, some search
        online, some just guess what their local center takes. It's fragmented
        and people give up.


        The app puts it all in one place: find a center, see what they actually
        accept, schedule a pickup if needed. That saves time, but more
        importantly it removes friction — people are more likely to recycle if
        the path is clear.
    - id: purpose-advantage-0-extraction-r0
      value:
        purpose: null
        advantage: "Consolidation of fragmented sources into a single app. Currently
          residents juggle multiple sources (calling city, searching online,
          guessing what local centers accept). The app puts it all in one place:
          find a center, see what they actually accept, schedule a pickup if
          needed. This removes friction and makes people more likely to recycle
          if the path is clear."
        measurement: null
        responseInterpretation: The respondent identified consolidation as the biggest
          advantage. They framed this as solving the current fragmentation
          problem where residents use multiple disconnected sources (city calls,
          online searches, guessing). The app's core advantage is removing
          friction by centralizing information and actions, which increases
          willingness to recycle. This aligns with suggestion (a) on time
          savings and (b) on showing what centers accept, but the respondent's
          emphasis is on consolidation and friction reduction as the primary
          driver, not just individual task efficiency.
        contradictions: []
        responseClass: answer
    - id: purpose-measurement-0-composition-r0
      value:
        question: How would you know if the app is working well — what **success
          metrics** matter most to you?
        suggestions:
          - Number of residents using the app monthly and how often they use it
            to find drop-off locations
          - Reduction in the number of calls to the city about recycling
            centers, or increase in residents who complete pickups after finding
            a center in the app
          - User feedback showing the app saved them time compared to calling or
            searching online
    - id: purpose-measurement-0-question-r0
      value: >-
        For me, the real win is behavior change — whether people actually
        recycle more because of the app. That's hard to measure directly, but
        I'd track:


        **Completion rates**: How many people who open the app to find a center
        actually follow through — either drop off materials or schedule a
        pickup? If they're just browsing and leaving, the app isn't solving the
        problem.


        **Pickup requests**: The number of large-item pickups scheduled through
        the app. That's a concrete proxy for "we removed a barrier that was
        stopping people."


        **Support load reduction**: How many fewer calls the city gets asking
        "where do I recycle X?" If the app is working, that number should drop
        noticeably.


        Call volume is probably the easiest to measure and most honest — it's
        something the city tracks anyway.
    - id: purpose-measurement-0-extraction-r0
      value:
        purpose: null
        advantage: null
        measurement: "Behavior change — whether people actually recycle more because of
          the app. Track: (1) Completion rates — how many people who open the
          app to find a center actually follow through (drop off materials or
          schedule a pickup), not just browsing; (2) Pickup requests — number of
          large-item pickups scheduled through the app as a concrete proxy for
          removing barriers; (3) Support load reduction — how many fewer calls
          the city gets asking 'where do I recycle X?' — call volume is probably
          the easiest to measure and most honest, since the city tracks it
          anyway"
        responseInterpretation: "The respondent rejected the suggested metrics (monthly
          active users, calls-reduction alone, user feedback) as incomplete.
          They reframed success as actual behavior change — residents recycling
          more — and identified three operational measurements: completion rates
          (find → follow-through), pickup requests (concrete barrier removal),
          and call volume reduction (easiest to track, already in city systems).
          Call volume is their preferred metric because it's honest and already
          measured."
