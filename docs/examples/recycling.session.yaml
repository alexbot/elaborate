    - id: goal-seed-extraction
      value:
        goals:
          - title: Maintain accurate material acceptance data across all centers
            description: Ensure the app's material lists stay synchronized with what each
              recycling center actually accepts. This means establishing a data
              update mechanism (manual, automated, or crowdsourced validation)
              and monitoring drift between app data and real-world center
              policies.
            rationale: "The measurement hints at a core failure mode: residents check the
              app, believe an item is accepted, show up with it, and the center
              rejects it. This destroys trust and defeats the app's purpose.
              Accuracy is not a feature—it's the foundation. Without it, the app
              becomes another unreliable source."
          - title: Reduce friction in the recycling decision path
            description: Make the path from 'I have something to recycle' to 'I know where
              to take it' as short and friction-free as possible. This includes
              search speed, material matching clarity, location proximity
              ranking, and pickup scheduling simplicity.
            rationale: "The advantage statement identifies friction as the core
              blocker—people abandon recycling when the path is unclear. This
              goal operationalizes that insight: every feature decision should
              be evaluated on whether it removes a step or clarifies the path.
              It's the north star for prioritization."
          - title: Enable residents to find centers accepting their specific item mix
            description: Support multi-item queries where residents can ask 'Do you accept
              these three things together?' and get centers that accept all of
              them, rather than requiring separate lookups per item. This
              addresses real-world recycling decisions where people have a bag
              of mixed items.
            rationale: "The purpose mentions 'check what materials each center accepts' but
              real residents don't recycle one item at a time. This goal
              captures the unstated user need: batch acceptance checking. It's a
              capability gap between 'single-item lookup' (easy to build) and
              'actual resident workflow' (harder but more valuable)."
        drainedWaitingRoomIds: []
    - id: goal-seed-present-r0
      value: >-
        Those are solid. I'd confirm (a) and (b) — those are real problems we
        need to solve.


        On (c), I'm less certain. Multi-item queries are nice-to-have, but most
        people just want to know if their local center takes what they have. I'd
        deprioritize that for now unless the data shows people are actually
        asking for it.


        I'd add one more: **Make the app accessible to elderly residents** — a
        lot of our target users aren't tech-savvy and need large text, simple
        navigation, and the ability to call the center directly from the app
        instead of figuring out scheduling online. Some people just want to talk
        to a person.
