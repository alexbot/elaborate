        **API access is fragmented.** I have access to 12+ municipal APIs, but
        they're all different — different formats, different update schedules,
        some are reliable, some go down. There's no single authoritative data
        source. So data aggregation is going to be messy and ongoing.


        **Timeline pressure is real.** Leadership wants this launched within 6
        months to show progress on sustainability goals. That's tight for
        building, integrating with centers, and getting data clean enough to
        launch.


        **Staffing for data maintenance is the bottleneck.** I'm managing this
        myself right now, plus my regular job. Once the app launches, someone
        needs to own data accuracy — chasing centers, validating updates,
        monitoring for drift. I don't have budget for a dedicated person yet, so
        that's a risk.


