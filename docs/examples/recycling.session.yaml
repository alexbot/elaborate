    - id: stakeholder-elaboration-stakeholder_003-0-composition-r0
      value:
        question: What would **recycling center staff** need from this app to do their
          job better or handle residents more smoothly?
        suggestions:
          - Being able to update what materials we accept in real time so the
            app stays current
          - Getting alerts when residents call with questions about items we
            listed
          - Nothing — residents don't interact with us through the app, so it
            doesn't affect our work
    - id: stakeholder-elaboration-stakeholder_003-0-question-r0
      value: >-
        Honestly, the staff themselves probably don't need much from the app —
        you're right that residents don't interact with them through it.


        But the **center managers** need a way to update their accepted
        materials list when it changes. Right now we push data to them quarterly
        or when they call with corrections. If they could update it themselves
        in real time, we'd catch changes faster and reduce the material
        rejection problem.


        The bigger issue for staff is just getting fewer calls asking "do you
        take X?" If the app works, those calls drop and they can focus on actual
        recycling instead of fielding the same questions all day.
    - id: stakeholder-elaboration-stakeholder_003-0-extraction-r0
      value:
        responseInterpretation: "Recycling center staff themselves don't need much from
          the app since residents don't interact with them through it. However,
          center managers need the ability to update the accepted materials list
          in real time instead of the current quarterly push or call-based
          corrections process. Faster updates would reduce material rejections.
          The main staff benefit is operational: if the app works and provides
          accurate material information, residents will make fewer calls asking
          \"do you take X?\", freeing staff to focus on actual recycling work
          instead of answering the same questions repeatedly."
        role: "The respondent distinguished between staff (who answer phones and process
          materials) and center managers (who maintain the materials list).
          Staff role: field resident inquiries; Manager role: maintain and
          update accepted materials data."
        concerns:
          - Staff spend significant time fielding repetitive calls asking
            whether the center accepts specific materials
          - Current process for updating accepted materials list is slow
            (quarterly pushes or reactive corrections via phone calls)
          - Material data becomes outdated, leading to rejected materials when
            residents arrive with items they believed were accepted
        contradictions: []
        waitingRoomItems:
          - content: Center managers need real-time ability to update accepted materials
              list (currently quarterly or call-driven)
        responseClass: answer
    - id: stakeholder-elaboration-stakeholder_004-0-composition-r0
      value:
        question: As the **recycling coordinator**, what would you most need this app to
          do for your centers and your job?
        suggestions:
          - Keep material acceptance data accurate and up-to-date across all
            centers so residents show up with the right items
          - Reduce the volume of repetitive phone calls staff field about what
            materials we accept
          - Give me visibility into which centers have outdated information so I
            can prioritize updates
    - id: stakeholder-elaboration-stakeholder_004-0-question-r0
      value: >-
        All three matter, but here's the reality: **data accuracy is the
        foundation, but it's a moving target.**


        Each center's accepted materials list changes quarterly — sometimes more
        often. We have 12+ different municipal APIs we pull data from, and they
        don't update on the same schedule. Some centers change policy and don't
        tell us for weeks. Right now I'm manually chasing centers for updates
        and it's a mess.


        So I need:

        1. **A reliable way to ingest and sync that data** — ideally automated,
        but at minimum a dashboard where I can see which centers are stale and
        flag them for update.

        2. **Center managers to own their own data** — give them a simple
        interface to update materials when policy changes, instead of relying on
        me as the middleman.

        3. **Call volume metrics** — so I can prove to leadership that the app
        is actually working. If people stop calling asking "do you take
        aluminum?" then we know the app is being used.


        The pickup scheduling piece is secondary — that's tied to truck routes,
        which the city already manages separately. The app just needs to slot
        into that system, not reinvent it.
    - id: stakeholder-elaboration-stakeholder_004-0-extraction-r0
      value:
        responseInterpretation: "All three suggested needs matter, but data accuracy is
          the foundation and the primary challenge. Material acceptance lists
          change quarterly or more frequently. The coordinator currently manages
          data sync manually from 12+ municipal APIs that update on different
          schedules, with centers often not communicating policy changes for
          weeks. The coordinator needs: (1) automated data ingestion and sync,
          or at minimum a dashboard to identify stale center data and flag it
          for update; (2) center managers to have a simple interface to update
          their own materials when policy changes, removing the coordinator as
          middleman; (3) call volume metrics to demonstrate to leadership that
          the app is working and being used. Pickup scheduling is secondary and
          should integrate with existing city truck route management rather than
          reinvent it."
        role: Manages data accuracy across multiple centers; manually chases centers for
          material acceptance updates; coordinates with 12+ municipal APIs;
          reports to leadership on app effectiveness
        concerns:
          - Material acceptance data changes quarterly or more frequently,
            creating a moving target
          - 12+ different municipal APIs pull data on different update
            schedules, making sync difficult
          - Centers often don't notify the coordinator when policy changes,
            causing weeks-long delays in updates
          - Currently manually chasing centers for updates is inefficient and
            unsustainable
          - No visibility into which centers have stale or outdated information
          - Need to demonstrate to leadership that the app reduces call volume
            and drives adoption
        contradictions: []
        waitingRoomItems:
          - content: Automated data ingestion and sync from municipal APIs
          - content: Dashboard to identify stale center data and flag for update
          - content: Interface for center managers to self-serve update material acceptance
              lists
          - content: Call volume metrics tracking to measure app effectiveness
          - content: Integration with existing city truck route management system for
              pickups
        responseClass: answer
    - id: stakeholder-elaboration-stakeholder_005-0-composition-r0
      value:
        question: What **problems or questions** do residents bring to your help desk
