    - id: purpose-confirmation-r0
      value: >-
        That's accurate. I'd only add one thing to measurement: we should also
        track **material rejection rates** — how often people show up with stuff
        the center won't take, even after checking the app.


        If that number stays high, it means either the app's material lists are
        wrong or out of sync with what centers actually accept. That's a data
        quality problem we'd need to fix.


        Otherwise, yeah, that captures it.
