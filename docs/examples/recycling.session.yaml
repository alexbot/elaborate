    - id: goal-refinement-goal_004-clarify-0-composition-r0
      value:
        question: When you say the app should be **accessible to elderly residents**,
          what would that look like in practice?
        suggestions:
          - Larger text, high-contrast colors, and simple navigation so
            residents don't need reading glasses or get lost in menus
          - The app loads quickly on older phones and works without needing to
            update to the latest software
          - A phone number to call for help instead of requiring residents to
            troubleshoot on their own
    - id: goal-refinement-goal_004-clarify-0-question-r0
      value: >-
        All three matter, but I'd prioritize differently than that list
        suggests.


        The phone-call option is essential — some people won't use an app no
        matter how simple it is. They want to talk to someone. So we need a
        direct dial button to the center, not buried in help docs.


        Text size and navigation simplicity are important too, but honestly the
        bigger issue is that older residents often don't trust apps they don't
        understand. If they can see a center's name, address, and hours clearly
        — and hit a button to call — that removes the fear. They don't need
        fancy features.


        Device compatibility matters less than you'd think — most elderly users
        have reasonably recent phones. The constraint is usually just their
        comfort level with the interface, not the hardware.
    - id: goal-refinement-goal_004-clarify-0-extraction-r0
      value:
        responseInterpretation: The respondent prioritizes a direct-dial button to call
