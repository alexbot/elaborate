    - id: stakeholder-review-present-r0
      value: >-
        That's mostly right, but I'd shuffle the priorities.


        **Residents** and **elderly residents** should be one group — they're
        the same people, just with different needs. Call them "residents" and
        note that accessibility for elderly users is a key design constraint.


        **Recycling center staff** — I'm not sure they're primary. They're
        affected (they'll get calls from confused users if the app is wrong),
        but they're not really stakeholders in shaping the app. They just need
        accurate data pushed to them.


        **City/municipal recycling coordinator** — move this to primary. They're
        the ones who manage the material lists, control pickup scheduling, and
        set policy. Without their buy-in, the app can't maintain accurate data
        or integrate with their systems.


        I'd add **local environmental nonprofits** — they often partner with
        cities on recycling outreach and could help distribute the app or
        validate data.


        Leave out the help desk for now unless we're planning to staff one.
