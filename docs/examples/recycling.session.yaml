    - id: stakeholder-elaboration-stakeholder_001-0-composition-r0
      value:
        question: From the city's perspective, what would **residents seeking to
          recycle** need most from this app to actually use it?
        suggestions:
          - Quick access to nearby centers and what materials they accept — so
            residents don't waste time with rejected items
          - A way to verify center hours and locations without having to call or
            search multiple websites
          - An option to contact the center directly if they're unsure about a
            specific item
    - id: stakeholder-elaboration-stakeholder_001-0-question-r0
      value: >-
        Speed and clarity. Residents need to open the app, see their nearest
        center, confirm it accepts what they have, and either drive there or
        schedule a pickup — all in under two minutes.


        The catch is that "nearest" is trickier than it sounds. In dense urban
        areas, GPS gets fuzzy within a couple hundred meters, so we can't always
        reliably say "this one is closest." We have to show options and let
        residents pick based on location, hours, or accepted materials.


        Beyond that — yes, direct contact matters. A phone number they can tap
        is crucial. Some won't trust the app data and need to call ahead anyway,
        especially if they have an unusual item.
    - id: stakeholder-elaboration-stakeholder_001-0-extraction-r0
      value:
        responseInterpretation: Residents seeking to recycle need speed and clarity — to
          open the app, see their nearest center, confirm it accepts what they
          have, and either drive there or schedule a pickup, all in under two
          minutes. The respondent emphasized that 'nearest' is complex in dense
          urban areas where GPS is unreliable within a couple hundred meters, so
          the app must show multiple options and let residents choose based on
          location, hours, or accepted materials rather than claiming one is
          objectively closest. Direct contact (phone number) is crucial because
          some residents won't trust app data and need to call ahead, especially
          for unusual items.
        role: null
        concerns:
          - Need to complete recycling task (find center, verify acceptance,
            arrange transport/pickup) in under two minutes
          - GPS unreliability in dense urban areas makes 'nearest center'
            ambiguous — residents need multiple options to choose from
          - Distrust of app data — some residents require direct phone contact
            to verify acceptance, particularly for unusual items
          - Risk of wasted trips if app data is wrong or outdated — residents
            may show up with items centers won't accept
        contradictions: []
        waitingRoomItems:
          - content: GPS accuracy limitations in dense urban areas mean the app cannot
              reliably determine which center is objectively closest — must show
              options instead
        responseClass: answer
