    - id: stakeholder-elaboration-stakeholder_007-0-composition-r0
      value:
        question: When researchers are writing their **data management plan**, what role
          do data stewards typically play, and what would matter most to you in
          that process?
        suggestions:
          - Data stewards review the data handling and storage sections to
            ensure compliance with institutional data governance policies — we'd
            care most about having clear visibility into what researchers are
            committing to funders so we can flag risks early.
          - We consult informally when researchers ask questions about
            repository options or data retention — we'd want the tool to reduce
            those ad-hoc questions by surfacing requirements upfront so
            researchers know what they need to plan for.
          - Data stewards aren't typically involved — that's between researchers
            and the compliance team — but we'd want to know if there are any
            emerging gaps in how data is being managed across projects.
    - id: stakeholder-elaboration-stakeholder_007-0-question-r0
      value: >-
        It's mostly (a). Data stewards need to know what researchers are
        committing to in their DMPs so we can make sure those commitments are
        actually feasible from an institutional standpoint. Like, if a
        researcher promises NSF they'll store data in a specific repository for
        seven years, we need to know that's something we can actually support.
        If they promise open access but the data has confidentiality issues,
        that's a problem we need to catch early.


        Right now we find out about these commitments reactively — either the
        researcher mentions it when they're writing the DMP, or we see it after
        the fact when the DMP is approved and the researcher is actually trying
        to manage the data. The tool could help by surfacing those commitments
        earlier so we can flag institutional risks before the DMP gets locked
        in.


        The (b) stuff happens too, but that's more informal. We'd rather catch
        issues proactively than field a dozen questions about "can we actually
        do this?"
