    - id: stakeholder-elaboration-stakeholder_005-0-composition-r0
      value:
        question: What **compliance or liability risks** concern your office most when
          researchers submit Data Management Plans to external funders?
        suggestions:
          - Researchers submitting non-compliant DMPs that trigger funder
            rejections, which then expose the institution to reputational damage
            or funder scrutiny
          - Lack of institutional oversight — we can't track what researchers
            are committing to funders or catch gaps before submission
          - Funder policies changing without our knowledge, so researchers
            unknowingly submit under outdated requirements and the institution
            gets blamed
    - id: stakeholder-elaboration-stakeholder_005-0-question-r0
      value: >-
        All three, honestly. But if I'm being real about what keeps me up at
        night, it's (c). A researcher submits a DMP under what they think are
        the current NSF rules. Six months later NSF updated their policy and we
        didn't know. The funder rejects it or — worse — accepts it and then
        later audits the research and finds out the data wasn't managed
        according to current NSF standards. That reflects badly on us as an
        institution.


        (a) is the daily grind — we catch stuff, send it back, researchers
        revise. That's workable even if it's tedious. But (b) and (c) are the
        systemic problems. We don't have good visibility into what researchers
        are committing to, and we don't have a reliable way to stay on top of
        changing requirements. The tool could help with both if we can solve the
        "how do we know when rules change" problem.
