    - id: validation-summary-present-r0
      value: >-
        This is solid work. The findings are fair — they're the real tensions
        that'll come up later if we don't address them now.


        On the unresolved findings: I want to be direct. The **ethics conflict**
        one is the biggest. Yeah, goal_004 says "don't resolve conflicts," but
        in practice, when an ethics committee says "this data stays
