      value: >-
        This is good, but I want to flag the unclear ones because they're
        actually important.


        **(k) Judgment-call requirements** — Yeah, this is the hard part. Some
        funder requirements are clear ("describe your data retention plan"), but
        others are squishy ("ensure data is findable"). We need to be honest
        about what the tool can and can't validate. Maybe it checks that
        *something* is there in the relevant section, but it can't really judge
        whether it's *adequate*. That's probably still a compliance officer
        review.


        **(l) Institutional capability conflicts** — This one should probably be
        *in* scope, at least partially. The tool should flag when a researcher
        commits to something in the DMP that might be infeasible from an
        institutional standpoint (like "data will be stored for 10 years" when
        our repo only guarantees 5). Not resolve it — just surface it so data
        stewards can catch it early.


        **(m) Second-line support** — Out of scope, I think. The tool flags
        issues, researchers (and maybe librarians) figure out what to do. We're
        not building an AI tutor here.


        One more thing: I'd add to in-scope that the tool needs to handle DMPs
        in multiple formats. Researchers use the online editor to create
        structured DMPs, but sometimes they import Word documents or PDFs from
        other sources. The checker needs to work with both.
