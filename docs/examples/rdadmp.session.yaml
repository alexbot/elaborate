    - id: stakeholder-elaboration-stakeholder_004-0-question-r0
      value: >-
        We do (a) — that's the main thing. Researchers submit drafts or
        near-final versions, we manually check them against funder requirements,
        flag gaps, send them back for revision. It's time-consuming and
        error-prone because we're doing it by hand, cross-referencing against
        scattered policy docs.


        We also do some of (b), though that's more ad hoc. If there's an ethics
        issue or a data security concern, we might catch it. But that's not
        really our lane — that's more the responsibility of the ethics committee
        or the data stewards.


        We don't wait for rejections to review — we catch things before they go
        out. That's the whole point. But if something does slip through and a
        funder rejects it, we see that rejection and learn we missed something.
