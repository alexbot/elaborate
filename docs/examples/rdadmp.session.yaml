    - id: stakeholder-elaboration-stakeholder_003-0-composition-r0
      value:
        question: What role do **funder program officers** play in communicating or
          updating requirements that researchers need to follow?
        suggestions:
          - They publish formal policy updates and announcements that get pushed
            to institutions or posted on the funder website
          - They handle researcher questions about requirement interpretation
            but don't formally notify us when policies change
          - They work directly with our compliance team to flag urgent changes,
            but smaller updates sometimes slip through
    - id: stakeholder-elaboration-stakeholder_003-0-question-r0
      value: >-
        It's messy. Formally, they publish updates on the funder website, press
        releases, maybe email to program directors. But in practice? Program
        officers also field researcher questions, sometimes give informal
        guidance that contradicts what's on the website, or clarify edge cases
        that aren't explicitly in the policy docs. We don't always know about
        those conversations.


        And yeah, smaller updates slip through. A funder might quietly update a
        PDF on their site without announcing it loudly. We find out six months
        later when a researcher's DMP gets flagged in review. There's no
        reliable notification system — we have to actively monitor.


        The bigger problem is interpretation. Two different program officers at
        the same funder might give slightly different answers to "does this
        satisfy your data retention requirement?" and we have no way to know
        that's happening until it surfaces in a rejection.
