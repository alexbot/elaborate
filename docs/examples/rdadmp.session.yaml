        waitingRoomItems: []
        responseClass: answer
    - id: scope-contrast-2-composition-r0
      value:
        question: When the tool flags a requirement issue, should it just highlight the
          problem, or should it also provide **interpretation help** — like
          explaining what the funder means and how to fix it?
        suggestions:
          - Just flag it — the compliance team and librarians handle
            interpretation
          - Flag it plus provide basic guidance — e.g., 'NSF requires a data
            retention plan; see section 2.3 of their guidelines'
          - Flag it plus suggest how to revise the DMP to meet the requirement
    - id: scope-contrast-2-question-r0
      value: >-
        I'd say (b) — flag it and provide basic guidance like pointing to the
        actual policy doc or explaining what the requirement means in plain
        language. Not prescriptive revision suggestions, but enough context that
        researchers aren't totally lost.


        Here's why: if the tool says "NSF requires a data retention plan"
        without any explanation, researchers might still not know what that
        means or where to look. But if it says "NSF requires you to describe how
        long you'll keep the data and where — see section 2.3 of their policy,"
        that's actionable without the tool trying to write the DMP for them.


        The librarians can still step in for deeper interpretation help, but the
        tool can at least point people in the right direction. That reduces some
        of the ad-hoc questions and gives researchers a fighting chance to
        self-serve.
    - id: scope-contrast-2-extraction-r0
      value:
        responseInterpretation: "The respondent chose option (b): flag issues and
