    - id: goal-seed-extraction
      value:
        goals:
          - title: Enable researchers to self-serve compliance validation
            description: Researchers can independently verify their DMPs against funder
              requirements without manual review cycles, reducing dependency on
              compliance staff and enabling faster iteration.
            rationale: Current measurement focuses on rejection reduction and time savings,
              but the underlying capability shift is from manual gatekeeping to
              researcher autonomy. This goal captures the operational
              independence outcome.
          - title: Consolidate and maintain authoritative funder policies
            description: Create a single source of truth for funder DMP requirements that
              stays current as policies change, eliminating researcher guesswork
              across scattered PDFs, web pages, and institutional email.
            rationale: The advantage statement identifies policy fragmentation as a core
              problem, but the measurement doesn't directly track whether the
              tool successfully centralizes and maintains policies. This goal
              makes policy governance explicit.
          - title: Establish predictable compliance outcomes
            description: Achieve deterministic alignment between tool validation and funder
              acceptance—when the tool says a DMP passes, it actually passes
              without surprise rejections for missing requirements.
            rationale: "Measurement includes 'tool says you're good and researchers actually
              are,' but this framing is reactive (catching mismatches). This
              goal reframes it as an outcome: predictability itself becomes a
              success criterion that builds researcher and compliance team
              trust."
        drainedWaitingRoomIds: []
    - id: goal-seed-present-r0
      value: >-
        Those three are good. But I want to flag something about (c) —
        "deterministic alignment" is the dream, but I'm not sure it's fully
        achievable. Some checks are straightforward (field present/absent), but
        others require judgment calls. Like, is the data retention policy
        "adequate"? The tool might say yes, but a funder program officer might
        disagree. We should probably be honest about that limitation upfront
        rather than promise perfect prediction.


        The one thing I'd add: **Handle multi-funder grants gracefully**. When a
        researcher is applying to NSF and NIH on the same project, and those
        funders want different things, the tool should either flag the conflict
        or somehow help them navigate it. Right now that's just a manual
        headache.
    - id: goal-seed-classification-r0
      value:
        responseInterpretation: "The respondent confirmed the three goals are sound.
          They flagged a limitation in goal_003 ('Establish predictable
          compliance outcomes'): deterministic alignment is aspirational but not
          fully achievable because some compliance checks require judgment
          (e.g., whether data retention is 'adequate'). Funders may disagree
          with the tool's assessment. They want this limitation acknowledged
          upfront rather than overpromised. They also identified a new
          operational need: the tool should handle multi-funder grants where NSF
          and NIH have conflicting requirements, either by flagging conflicts or
          helping researchers navigate them. Currently this is manual work."
        confirmedGoalIds:
