  entries:
    - id: opening-greet-r0
      value: >-
        I appreciate the greeting, but I should clarify: I'm playing a
        stakeholder being interviewed *about* a research compliance project, not
        the other way around. This is a roleplay scenario where you're gathering
        information from me.


        I'm ready to answer questions about our Data Management Plan (DMP)
        compliance checker — the tool we're building to check whether
        researchers' DMPs meet funder-specific requirements. Ask away.
    - id: opening-greet-extraction-r0
      value:
        purpose: Build a tool to check whether researchers' Data Management Plans (DMPs)
          meet funder-specific requirements
        stakeholders:
          - researchers
          - funders
        domainHints:
          - research compliance
          - data management
          - funder requirements
        responseClass: answer
    - id: opening-brownfield-screen
      value:
        greenfieldConfidence: 8
        rationale: User describes a tool to be built with no mention of existing
          codebases, prior versions, legacy systems, or inherited artifacts. The
          purpose statement and stakeholders are purely directional — no
          reference to 'we have a prototype,' 'building on X,' 'integrating with
          Y,' or 'replacing Z.' Domain context (research compliance, DMPs,
          funder requirements) is problem-space knowledge, not existing work.
          High confidence this is greenfield, with small reserve (2 points) for
          possibility that user omitted mention of internal prototypes or
          institutional systems during initial framing.
    - id: opening-summary-r0
      value: Mostly, yeah — but it's a bit more complex on the stakeholder side than
        just researchers and funders. The compliance checker is an add-on to our
        existing DMP creation tool, so researchers will definitely use it. But
        there are other people involved too — institutional compliance officers
        need to sign off, librarians might help researchers interpret feedback,
        maybe department heads care about whether their grants are at risk. I'm
        not sure we've mapped out everyone yet, honestly.
    - id: opening-confirmation-classification-0-r0
      value:
        approved: false
        revisionRequested: "Stakeholder map is incomplete. Researchers and funders
