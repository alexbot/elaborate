          - goal_002
          - goal_003
        removedGoalIds: []
        newGoals:
          - title: Handle multi-funder grant conflicts
            description: When a researcher applies to multiple funders with different DMP
              requirements (e.g., NSF and NIH), the tool should flag conflicts
              or provide guidance to help navigate them, rather than leaving it
              as manual work.
        waitingRoomItems:
          - content: Deterministic alignment is the dream, but some checks are
              straightforward (field present/absent), while others require
              judgment calls. Like, is the data retention policy 'adequate'? The
              tool might say yes, but a funder program officer might disagree.
              This limitation should be stated upfront rather than promising
              perfect prediction.
        responseClass: answer
    - id: goal-sort
