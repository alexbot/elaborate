          the problem without resolving it, protecting researcher agency and the
          tool's liability.
        contradictions: []
        waitingRoomItems:
          - content: Handle DMP version drift when funder rules change mid-cycle — either
              grandfathering based on submission date or flagging which version
              of the rules a DMP was checked against
        responseClass: answer
