    - id: goal-refinement-goal_004-clarify-0-composition-r0
      value:
        question: When you say 'handle multi-funder grant conflicts,' what would that
          concretely look like — a researcher submitting one DMP to multiple
          funders, or something else?
        suggestions:
          - A researcher gets flagged when they apply to NSF and NIH in the same
            proposal, and the tool shows which requirements overlap and which
            conflict (e.g., data retention rules differ).
          - The tool lets a researcher pick multiple funders upfront and
            highlights which requirements they can satisfy with one approach and
            which need separate versions or workarounds.
          - When requirements genuinely contradict, the tool explains the
            conflict and suggests which funder's rule takes precedence or
            recommends the researcher contact both funders.
    - id: goal-refinement-goal_004-clarify-0-question-r0
      value: >-
        I think it's (a) mostly, but with a practical twist. A researcher would
        select the funders they're applying to, and the tool shows overlaps and
        conflicts. But here's the thing — I don't think we can tell them which
        funder "wins" or what the right workaround is. That's above our pay
        grade. What we *can* do is flag it clearly and say "NSF wants open data,
        NIH restricts sharing of identifiable health info — you need to figure
        out how to satisfy both or talk to the funders." 


        We're not giving legal advice or making judgment calls for them. Just
        surfacing the problem so they don't accidentally submit something that
        violates one funder's rules while trying to satisfy the other's.
    - id: goal-refinement-goal_004-clarify-0-extraction-r0
      value:
        responseInterpretation: A researcher selects the funders they're applying to,
          and the tool shows overlaps and conflicts between their requirements.
          The tool flags conflicts clearly (e.g., 'NSF wants open data, NIH
          restricts sharing of identifiable health info') but does not advise
          which funder's rule takes precedence or recommend specific
          workarounds. The tool surfaces the problem so researchers don't
          accidentally violate one funder's rules while satisfying another's.
          The tool does not give legal advice or make judgment calls — that
          responsibility stays with the researcher and the funders.
        title: Flag and surface multi-funder requirement conflicts without resolving
          them
        description: When a researcher selects multiple funders, the tool identifies
          overlapping requirements and genuine contradictions between funder
          policies. It presents conflicts clearly with the specific rules in
          tension (e.g., data sharing restrictions that differ) so the
          researcher can decide how to proceed or contact the funders. The tool
          does not recommend which funder's requirement takes precedence,
          suggest workarounds, or provide legal/compliance advice.
        rationale: Researchers applying to multiple funders need to know where their
          policies conflict so they can make informed decisions about how to
          satisfy both or seek clarification from the funders themselves. The
          tool's role is to surface and explain the problem, not to resolve it —
          that protects both the tool's liability and ensures researchers
          maintain agency over compliance decisions.
        contradictions: []
        waitingRoomItems:
          - content: Tool should not give legal advice or make judgment calls about
              compliance — that responsibility stays with the researcher and the
              funders
          - content: Tool should flag conflicts clearly but let researchers decide how to
              satisfy both requirements or contact the funders
        responseClass: answer
    - id: goals-confirmation-r0
      value: >-
        That's solid. I'd just tweak the third one slightly — it's not just
        about researchers applying to multiple funders *at the same time*. We
        also have cases where a researcher comes back with a revised DMP because
        one funder's rules changed mid-cycle. A DMP that passed last month under
        v1 of the NSF rules might fail under v2. We need to handle that somehow
        — maybe grandfathering it based on submission date, or flagging which
        version of the rules it was checked against. Right now I'm not sure how
        we're solving that, but it's a real problem.


        Other than that, yeah, those three goals work.
    - id: goals-confirmation-classification-0-r0
      value:
        approved: false
        revisionRequested: goal_004 needs to account for rule version changes mid-cycle,
          not just simultaneous multi-funder applications. Researchers may need
          to revalidate DMPs when funder rules change (e.g., NSF v1 to v2).
          Current solution unclear — could use submission-date grandfathering or
