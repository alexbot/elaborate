    - id: stakeholder-elaboration-stakeholder_001-0-composition-r0
      value:
        question: What would **researchers** need from this tool to actually use it when
          they're writing a DMP?
        suggestions:
          - A checklist they can work through step-by-step that shows which
            funder requirements apply to their grant
          - Confidence that it covers all the funders they're submitting to, so
            they're not missing policies somewhere else
          - Something fast enough to use while writing, not a separate review
            step they do after
    - id: stakeholder-elaboration-stakeholder_001-0-question-r0
      value: >-
        All of those matter, but the biggest one is speed and integration.
        Researchers are already in the DMP tool writing their plan — they don't
        want to export it, run it through some separate checker, wait for
        results, then come back and edit. It needs to be built in, real-time or
        near-real-time feedback as they write. "You haven't addressed NSF's data
        retention requirement yet" while they're still drafting is way more
        useful than finding that out after they're done.


        The checklist idea is good too, but only if it's tied to *their specific
        funders*. A generic checklist of every funder requirement under the sun
        isn't helpful. And confidence — yeah, they need to trust that if the
        tool says they're good, they actually are. Though like I said earlier,
        that's tricky for the judgment-call stuff.
    - id: stakeholder-elaboration-stakeholder_001-0-extraction-r0
      value:
