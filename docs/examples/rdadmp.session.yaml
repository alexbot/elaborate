          customized to their specific funders, not a generic list of all
          possible requirements. They also need to trust the tool's judgment,
          though the respondent acknowledges this is difficult for subjective
          compliance calls.
        role: researchers are already in the DMP tool writing their plan and need
          integrated, real-time feedback rather than a separate workflow step
        concerns:
          - Speed and integration — researchers don't want to export, run
            through separate checker, wait for results, then return to edit
          - Real-time or near-real-time feedback while drafting, not after
            completion
          - Funder-specific checklists, not generic lists of all requirements
          - Trust that tool judgment is accurate — if it says they're good on
            requirements, they actually are
        contradictions: []
        waitingRoomItems:
