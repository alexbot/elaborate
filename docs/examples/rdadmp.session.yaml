        change has to be lightweight, not a heavy manual process.


        **Integration** — The DMP tool is already in production with researchers
        using it. We can't break that workflow while adding the compliance
        checker. It has to plug in cleanly.


        **Data format chaos** — Like I said, researchers create DMPs in our
        online editor (structured JSON or similar), but we also get Word
        documents, PDFs from other institutions, sometimes even plain text. The
        checker needs to handle that variety or we'll spend all our time
        converting formats.


        And here's one that might be ugly: **versioning and backfilling**. When
        funder rules change, what happens to DMPs that were already approved
        under the old rules? Do we re-check them? Do we grandfather them? Do we
        flag them as "checked under v1.2 of NSF policy"? We need a clear policy
        there or we'll either waste time re-checking everything or miss actual
        compliance drift.
    - id: scope-constraint-extraction-r0
      value:
        responseInterpretation: "The respondent identified four concrete constraints:
          (1) Capacity — cannot hire new staff to maintain the funder policy
          database; system must support lightweight, non-manual updates. (2)
          Integration — must plug into the existing production DMP tool without
          breaking researcher workflow. (3) Data format chaos — must handle
          structured JSON from the online editor plus Word documents, PDFs, and
          plain text from external sources, or the institution will spend
          excessive time converting formats. (4) Versioning and backfilling —
          needs a clear policy for handling DMPs approved under old funder rules
          when rules change (re-check vs. grandfather vs. version-tag), or the
          institution will either waste time re-checking everything or miss
          compliance drift."
        constraints:
          - description: Cannot hire new staff to maintain funder policy database — whoever
              owns it must do so alongside existing work; system for updating
              funder rules when they change must be lightweight, not a heavy
              manual process
          - description: DMP tool is already in production with researchers using it;
              compliance checker must plug in cleanly without breaking existing
              workflow
          - description: Must handle multiple DMP input formats — structured JSON from
              online editor, Word documents, PDFs from other institutions, plain
              text — or institution will spend excessive time converting formats
          - description: Must establish and follow a clear versioning and backfilling policy
              for DMPs approved under old funder rules when rules change; lack
              of clarity will either waste time re-checking everything or create
              compliance drift
        waitingRoomItems: []
        responseClass: answer
    - id: scope-contrast-0-composition-r0
      value:
        question: Should the tool check whether subjective requirements like 'data
          should be findable' are present in the DMP, or is judging whether
          they're adequately written out of scope?
        suggestions:
          - "In scope: flag when the section exists but is vague or incomplete;
            compliance team makes the final adequacy call"
          - "Out of scope: tool only validates that required sections are
            present; compliance team owns judgment about quality"
          - "Hybrid: tool flags presence and offers a rubric for adequacy, but
            does not block or fail the DMP"
    - id: scope-contrast-0-question-r0
      value: >-
        I think it's (b) — tool validates that sections exist, compliance team
        owns adequacy judgment. Here's why: if we try to build a rubric for "is
        this findable plan adequate?", we're basically encoding our own
        compliance judgment into the tool. That's risky. Different funders
        interpret "adequate" differently, and even within a funder, program
        officers disagree. The tool can't win that game.


        What the tool *can* do is say "NSF requires a data findability plan —
        you have a section labeled 'data discoverability' but it's pretty short.
        You might want to expand it." That's a hint, not a judgment. Then the
        compliance officer or researcher can decide if it's really adequate.


        The binary stuff — field present/absent, required metadata filled in —
        that's what the tool should own. The judgment calls stay with humans.
    - id: scope-contrast-0-extraction-r0
      value:
        responseInterpretation: "Judgment-call requirements (like 'data should be
          findable') should be OUT of the tool's validation scope. The tool
          validates binary facts: required sections are present, fields are
          filled. The compliance team owns adequacy judgment. The tool can
          provide hints (e.g., 'section exists but is short') without making
          pass/fail determinations. Different funders and program officers
          interpret adequacy differently, so encoding a rubric into the tool
          creates false authority and risk."
        classification: in
        reason: ""
        relatedGoals:
          - goal_001
          - goal_002
        waitingRoomItems: []
        responseClass: answer
    - id: scope-contrast-1-composition-r0
      value:
        question: Should the tool flag when a researcher's **promised data commitment**
          (like five-year storage) exceeds what your institution can actually
          support?
        suggestions:
          - Yes — flag it so data stewards can resolve the conflict early,
            before the DMP goes to the funder
          - No — that's a researcher-funder negotiation; the tool should only
            check funder rules
          - Yes, but only as a warning, not a compliance failure — researchers
            can override after talking to data stewards
    - id: scope-contrast-1-question-r0
      value: >-
        It should be (a), but with a caveat. The tool should absolutely flag it
        — "you promised five-year storage but institutional repo only guarantees
        three years." That's a real problem that needs catching early.


        But here's the thing: the tool can't make that decision for the
        researcher. It flags the conflict and says "you need to resolve this
        with your data steward." The researcher might negotiate with the funder
        to change the timeline, or they might find external storage that can
        handle five years, or they might come back and revise the DMP. Not our
        call.


        So yeah, flag it — that's institutional risk management. But don't block
        submission. Let the researcher and data steward work it out.
    - id: scope-contrast-1-extraction-r0
      value:
        responseInterpretation: The tool should flag conflicts between
          researcher-promised data commitments and institutional capabilities
          (e.g., five-year storage promise vs. three-year institutional
          guarantee). Flagging is institutional risk management and should
          happen early, before DMP submission. However, the flag is a
          notification to the researcher and data steward, not a blocking gate.
          The researcher can resolve the conflict by negotiating with the
          funder, finding external storage, or revising the DMP. The tool
