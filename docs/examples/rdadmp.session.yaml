          role), librarians (interpretation/support role), department heads
          (grant-risk concern). Respondent states uncertainty about full
          stakeholder list."
        targetId: stakeholders
        responseClass: answer
    - id: purpose-initial-extraction
      value:
        purpose: null
        advantage: null
        measurement: null
        responseInterpretation: "The stakeholder confirmed that researchers will use the
          compliance checker as an add-on to the existing DMP creation tool.
          However, they identified additional stakeholders beyond researchers
