    - id: stakeholder-elaboration-stakeholder_002-0-composition-r0
      value:
        question: From the funder's perspective, what **role** do you see them playing
          in a DMP compliance tool, and what outcomes would matter most to them?
        suggestions:
          - Funders want to reduce the number of incomplete or non-compliant
            DMPs they receive — fewer rejections means less back-and-forth with
            researchers.
          - Funders care that their requirements are represented accurately in
            the tool so researchers actually follow them, not just pass a
            checkbox.
          - Funders want visibility into whether researchers understand their
            policies — the tool should help them track compliance trends across
            submissions.
    - id: stakeholder-elaboration-stakeholder_002-0-question-r0
      value: >-
        (b) is the big one for us — and it's a headache. Funder rules aren't
        machine-readable. They publish them as PDF policy documents, web pages,
        sometimes just buried in grant guidance. Someone has to manually read
        those PDFs, figure out what the actual requirements are, and encode them
        into the tool. And when NSF updates their data management policy, we
        have to do that again.


        So from the funder side, they probably care that we're representing
        their rules correctly. But they also need to *tell us* when rules
        change. Right now there's no formal mechanism for that — we just have to
        monitor their websites and hope we catch updates before researchers
        submit under outdated requirements.


        (a) makes sense too — fewer incomplete DMPs means less work for them.
        (c) is interesting but I'm not sure that's our problem to solve. That's
        more of a funder analytics thing.
