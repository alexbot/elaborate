    - id: purpose-advantage-0-composition-r0
      value:
        question: What makes a **DMP checking tool** better than how researchers
          currently handle funder requirements?
        suggestions:
          - Saves time by automatically comparing DMPs against requirements
            instead of manual review
          - Reduces errors from researchers missing specific funder policies or
            compliance details
          - Gives researchers earlier feedback so they can revise before
            submission
    - id: purpose-advantage-0-question-r0
      value: >-
        The time savings is real, but honestly the bigger thing for us is
        consistency. Right now, a researcher might submit a DMP thinking it's
        fine, then our compliance officer flags something they missed — or
        worse, the funder rejects it after submission. If the checker catches
        gaps early in the writing process, researchers can fix things before
        they're locked in. That's the main win.


        The other piece is that funder rules are scattered everywhere — PDFs,
        web pages, sometimes just emails — and they change. A tool that
        centralizes that and tells you "your data sharing plan doesn't address
        NSF's openness requirement" is way better than a researcher googling
        three different funder policies and guessing whether they got it right.
    - id: purpose-advantage-0-extraction-r0
      value:
        purpose: null
        advantage: Consistency — catching gaps early in the writing process before
          researchers submit or funders reject. Centralizing scattered funder
          rules (PDFs, web pages, emails that change) so researchers don't have
          to guess whether they got policies right.
        measurement: null
        responseInterpretation: "Time savings matters, but the core value is preventing
          the cycle where researchers submit thinking they're compliant, then
          compliance officers or funders flag missing requirements after
          submission. The tool's main win is catching those gaps during writing
          so researchers can fix them before things are locked in. Secondary
          value: funder requirements are fragmented across many sources that
          change frequently; a tool that centralizes them and explicitly flags
          what's missing (e.g., 'your data sharing plan doesn't address NSF's
          openness requirement') beats researchers manually searching and
          guessing across three different funder policies."
        contradictions: []
        responseClass: answer
    - id: purpose-measurement-0-composition-r0
      value:
        question: How would you know if this tool actually **solved the problem** for
          researchers?
        suggestions:
          - Researchers submit DMPs on the first try without rejection feedback
            about missing funder requirements.
          - Time spent checking funder policies drops from hours to minutes, and
            researchers feel confident they've covered everything.
          - Fewer revisions needed between researcher drafts and final
            submission because gaps are caught early.
    - id: purpose-measurement-0-question-r0
      value: >-
        I think it's a combination. If researchers are hitting fewer rejections
        from funders for missing compliance stuff, that's the clearest signal.
        But also — and this matters to us — if our compliance team spends less
        time doing manual spot-checks before DMPs go out the door, that's real
        operational value.


        The confidence piece matters too. Right now researchers often aren't
        sure if they've done enough. If the tool says "you're good on NSF
        requirements" and they actually are, that's a win. Though I'll be honest
        — some of our compliance checks are pretty binary (is this field filled
        in?), but others are squishier. Like, is the data sharing plan actually
        "adequate"? That's harder to automate, so we might not catch everything.
    - id: purpose-measurement-0-extraction-r0
      value:
        purpose: null
        advantage: null
        measurement: Researchers submit DMPs on first try without rejection feedback for
          missing funder requirements. Time spent checking funder policies drops
          from hours to minutes. Researchers feel confident they've covered
          everything. Fewer rejections from funders for missing compliance stuff
          — clearest signal. Compliance team spends less time doing manual
          spot-checks before DMPs go out the door. Tool says 'you're good on NSF
          requirements' and researchers actually are.
        responseInterpretation: "Success is a combination: fewest rejections from
          funders for missing compliance stuff is the clearest signal;
          compliance team spending less time on manual spot-checks before DMPs
          go out is real operational value; researchers feeling confident the
          tool has verified they meet requirements matters. Some funder checks
          are binary (field filled in), others are harder to automate ('is the
          data sharing plan adequate?'), so the tool might not catch
          everything."
        contradictions: []
        responseClass: answer
    - id: purpose-confirmation-r0
      value: >-
        That's pretty accurate. One thing I'd add though — and this might matter
        later — is that we're not just checking against one funder. Researchers
        apply to multiple funders, and sometimes those funders have conflicting
        requirements. Like, one might require open data and another restricts
        sharing of certain data types. The tool needs to handle that somehow, or
        at least flag when there's a conflict.


        Other than that, yeah, that captures it.
    - id: purpose-confirmation-classification-0-r0
      value:
        approved: false
        revisionRequested: Tool needs to handle researchers applying to multiple funders
          with conflicting requirements. Should flag when funder requirements
          conflict (e.g., one requires open data, another restricts sharing of
          certain data types).
        targetId: purpose
        responseClass: answer
    - id: purpose-revision
      value:
        purpose: null
        advantage: null
        measurement: null
        responseInterpretation: "The captured artifacts are accurate. The respondent
          adds a critical constraint: researchers apply to multiple funders
          simultaneously, and those funders often have conflicting requirements
          (e.g., one requires open data, another restricts sharing of certain
