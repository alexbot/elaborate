    - id: goal-seed-extraction
      value:
        goals:
          - title: Validate market demand beyond friends
            description: Test whether customers at the farmers market (beyond the existing
              friend network) will actually buy cookies at a price point that
              makes the business viable. This goes beyond anecdotal interest
              from friends to real market signals.
            rationale: The purpose mentions friends asking to buy, but the measurement goal
              is sustainability — not just breaking even. Without validating
              demand from the broader farmers market customer base, it's unclear
              if friends represent genuine demand or just politeness. This goal
              isolates the real market test.
          - title: Establish a sustainable unit economics model
            description: Determine the per-unit cost, pricing, and volume needed to cover
              overhead (farmers market booth fee, ingredients, time) and
              generate actual profit. Not just one-week viability, but
              repeatable weekly operation.
            rationale: Measurement says 'actually be sustainable' — implying ongoing
              operation, not a one-off test. This requires knowing whether the
              cookie business can hit a margin that makes weekly selling worth
              the effort. Currently undefined.
          - title: Identify operational constraints for weekly sales
            description: "Surface and prioritize the practical limits on scaling baking and
              sales from home: production capacity, storage, time availability,
              food safety/licensing requirements, supply chain reliability. Know
              what stops weekly repetition."
            rationale: Moving from 'friends buy cookies' to 'weekly farmers market
              operation' crosses into operational complexity (licensing,
              production consistency, timing). The current conversation assumes
              feasibility without naming constraints. This goal forces clarity
              on what has to work for the venture to actually run weekly.
        drainedWaitingRoomIds: []
