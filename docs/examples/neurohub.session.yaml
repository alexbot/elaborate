    - id: stakeholder-elaboration-stakeholder_007-0-composition-r0
      value:
        question: When a lab requests to share data outside the institution, what
          **compliance checks** do you currently perform to verify it's safe to
          share?
        suggestions:
          - We manually check the IRB protocol approval and consent scope
            documents, then ask the lab PI to confirm the data matches those
            restrictions
          - We review the dataset itself—checking metadata, file contents, and
            asking the lab to document what processing was done before we can
            authorize sharing
          - We don't have a formal process yet; labs mostly self-certify and we
            spot-check after the fact if there's a question
    - id: stakeholder-elaboration-stakeholder_007-0-question-r0
      value: >-
        It's (a) and (b), but it's messy. I pull the IRB protocol, check what
        consent allows, then ask the lab "is this dataset what you say it is?"
        Usually they say yes, but sometimes they're not sure—they don't know
        which pipeline version was used, or whether intermediate files got mixed
        in.


        Then I spot-check the dataset itself. I look at file names, metadata
        headers, sometimes ask for a processing summary. But I'm not doing a
        deep audit every time—that would take forever.


        The real gap: there's no systematic way to verify the lab's claim that
        "this is the preprocessed output from protocol X, pipeline version Y."
        I'm taking their word for it, which is risky. If the platform had
        immutable provenance tracking, I could just query it and get a
        definitive answer in seconds instead of asking around and hoping they're
        right.


        We don't have a *formal* process yet, which is part of the problem. It's
        ad-hoc, person-dependent, and slow. That's exactly what this platform
        should fix.
    - id: stakeholder-elaboration-stakeholder_007-0-extraction-r0
      value:
        responseInterpretation: Institutional data stewards currently use both manual
          IRB protocol review (option a) and spot-check dataset inspection
          (option b), but the process is messy and ad-hoc. They pull the IRB
          protocol and check consent scope, then ask labs to confirm the dataset
          matches those restrictions. Labs often cannot reliably answer because
          they don't know which pipeline version was used or whether
          intermediate files got mixed in. Stewards then spot-check the dataset
          by examining file names, metadata headers, and requesting processing
          summaries, but do not perform deep audits every time due to time
          constraints. The critical gap is lack of systematic verification that
          a lab's claim about dataset provenance (which protocol, which pipeline
          version) is accurate—stewards currently take the lab's word for it,
          which is risky. A formal process does not exist; the current approach
          is ad-hoc, person-dependent, slow, and error-prone. The respondent
          sees immutable provenance tracking as the platform solution to
          eliminate manual verification.
        role: Institutional data stewards responsible for verifying compliance when labs
          request to share data outside the institution; they review IRB
          protocol approvals and consent scope documents, ask labs to confirm
          dataset contents match those restrictions, and spot-check datasets for
          metadata and processing history to authorize sharing.
        concerns:
          - Lab PIs cannot reliably answer whether a dataset is what they claim
            it is—they don't know which pipeline version was used or whether
            intermediate files got mixed in
          - No systematic way to verify a lab's claim that 'this is the
            preprocessed output from protocol X, pipeline version Y'—stewards
            must take labs' word for it, which is risky
          - Manual verification process is slow and requires asking around and
            hoping the lab is right
          - Spot-checking datasets by examining file names and metadata is
            time-consuming and cannot be done as a deep audit every time
          - Current process is ad-hoc, person-dependent, and slow—no formal
            process exists
        contradictions: []
        waitingRoomItems:
          - content: Platform should implement immutable provenance tracking so stewards can
              query provenance and get a definitive answer in seconds instead of
