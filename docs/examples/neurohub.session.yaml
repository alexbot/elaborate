    - id: stakeholder-elaboration-stakeholder_004-0-composition-r0
      value:
        question: What **compliance tasks** does your office handle when researchers
          want to share datasets outside the institution?
        suggestions:
          - Reviewing IRB protocol scope to confirm shared data fits within
            original consent language
          - Auditing data access logs and verifying no unauthorized downloads
            occurred before sharing
          - Checking that datasets are de-identified and meet regulatory
            requirements before external transfer
    - id: stakeholder-elaboration-stakeholder_004-0-question-r0
      value: >-
        All three, honestly. When a lab says "we want to share study X's data
        publicly," I need to:


        (a) Confirm the IRB protocol actually allows public sharing—some
        protocols limit sharing to "within institution only" or "collaborators
        on this specific grant." I have to read the protocol.


        (c) Verify de-identification is adequate. Brain imaging data can be
        re-identified from anatomical scans, so we have defacing standards and
        other checks.


        (b) is less about audit logs and more about **checking the dataset
        itself**—making sure raw identifiers didn't accidentally get included,
        that metadata doesn't expose subject info, that the provenance record is
        complete enough that external researchers can understand what they're
        getting.


        The piece that eats time: tracing back to confirm the dataset really is
        what the lab claims it is. If they say "this is the preprocessed fMRI
        from study X," I need to verify that's actually the case—that it came
        from the right consent protocol, the right acquisition parameters, the
        right pipeline. Right now that's manual detective work. The platform
        should make that instant.
    - id: stakeholder-elaboration-stakeholder_004-0-extraction-r0
      value:
        responseInterpretation: "IRB/compliance officers handle all three tasks: (a)
          confirming the IRB protocol allows public sharing, since some
          protocols restrict sharing to within-institution or specific
          collaborators only; (c) verifying de-identification is adequate—brain
          imaging data can be re-identified from anatomical scans, so defacing
          standards and other checks are applied; and (b) checking the dataset
          itself to ensure raw identifiers weren't accidentally included,
          metadata doesn't expose subject info, and the provenance record is
          complete enough for external researchers to understand what they're
          receiving. The most time-consuming piece is tracing back to confirm
          the dataset matches what the lab claims—verifying it came from the
          right consent protocol, right acquisition parameters, and right
          pipeline. This is currently manual detective work and should be
          instant on the platform."
        role: Verify IRB protocol consent scope allows the type of data sharing
          requested; confirm de-identification meets regulatory requirements;
          audit the dataset contents and metadata to ensure no raw identifiers
          were included and provenance is complete
        concerns:
          - Tracing back to verify a dataset is actually what the lab claims it
            is—confirming it came from the right consent protocol, right
            acquisition parameters, and right pipeline—requires manual detective
            work
          - Need to verify de-identification is adequate for brain imaging data,
            which can be re-identified from anatomical scans
          - Must check that raw identifiers didn't accidentally get included in
            datasets before sharing externally
          - Must verify metadata doesn't expose subject information
          - Must confirm the provenance record is complete enough that external
            researchers can understand what they're receiving
          - Time spent on manual verification of dataset contents and lineage
        contradictions: []
        waitingRoomItems:
          - content: The platform should make instant the manual detective work of tracing
              datasets back to confirm they match what labs claim—verifying
              consent protocol, acquisition parameters, and pipeline
        responseClass: answer
    - id: stakeholder-elaboration-stakeholder_005-0-composition-r0
      value:
        question: What **institutional policies** would institutional data governance
          teams need the platform to enforce or track?
        suggestions:
          - Data retention schedules and when datasets must be archived or
            deleted
          - Approval workflows—who reviews and signs off on data sharing
            requests before they leave the institution
          - Audit logging for compliance reporting to leadership or external
            regulators
    - id: stakeholder-elaboration-stakeholder_005-0-question-r0
      value: >-
        (a) and (c) are critical. We have funder requirements that datasets stay
        accessible for 10+ years. The platform needs to track retention dates
        and flag when something's at risk of being deleted prematurely or
        archived in a way that makes it inaccessible.


        (c)—audit logging—is non-negotiable. We need to answer "who accessed
        this dataset, when, and why?" for compliance reporting. That's partly
        for internal audit but also for external regulators if there's ever a
        data breach or privacy concern.


        (b) is less about formal approval workflows and more about
        **institutional override**. Lab PIs control their own data access, but
        if we detect a retention violation or a consent scope violation, data
        stewards need to step in and enforce it. That's not a workflow—it's an
        emergency lever.


        So add: **Institutional stewards can override lab PI decisions for
        compliance violations**. If a lab is about to violate IRB restrictions
        or retention policy, we can step in and block the action, and the system
        logs why we did it.
    - id: stakeholder-elaboration-stakeholder_005-0-extraction-r0
      value:
        responseInterpretation: Institutional data governance teams need the platform to
          enforce data retention schedules (tracking retention dates and
          flagging premature deletion or inaccessible archival) and provide
          audit logging (answering who accessed data, when, and why for
          compliance and breach reporting). Approval workflows are less
          important than institutional override capability—data stewards need an
          emergency lever to block lab PI decisions when retention violations or
          consent scope violations are detected, with system logging of the
          override reason.
        role: Institutional data stewards responsible for enforcing compliance
          violations (retention policy and IRB restrictions) by overriding lab
          PI data access decisions and logging the enforcement action
        concerns:
          - Datasets must stay accessible for 10+ years to meet funder
            requirements
          - Need to track retention dates and flag when something is at risk of
            being deleted prematurely or archived in a way that makes it
            inaccessible
          - Need to answer 'who accessed this dataset, when, and why?' for
            internal audit and external regulator reporting in case of data
