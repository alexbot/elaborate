    - id: purpose-confirmation-r0
      value: >-
        That's accurate. One thing to sharpen on measurement: the audit trail is
        only useful if it's *immutable*. Once a dataset version is published, it
        can't be modified retroactively—only superseded by a new version. That's
        a hard requirement for compliance and reproducibility.


        So maybe add: **Published datasets are immutable and versioned** — we
        track when changes happen, never lose the history, and researchers know
        they're working with a fixed snapshot.


        Otherwise, you've got it right.
