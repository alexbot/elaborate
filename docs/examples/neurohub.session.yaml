    - id: stakeholder-elaboration-stakeholder_006-0-composition-r0
      value:
        question: What would **lab PIs** need most from a system like this — better
          control over who accesses their data, automatic compliance checking,
          or something else?
        suggestions:
          - Control over access — they want to decide who can see their lab's
            data without going through multiple approval steps
          - Automatic compliance checking — they want the system to enforce
            consent rules so they don't accidentally share data outside IRB
            scope
          - Reduced administrative overhead — they want less time spent on
            compliance paperwork and more time running experiments
    - id: stakeholder-elaboration-stakeholder_006-0-question-r0
      value: >-
        It's (a) and (b) together. Lab PIs want **control without liability**.
        They need to decide who accesses their data—that's their prerogative as
        data owners. But they also want the system to catch mistakes before they
        happen. If consent doesn't permit sharing with an external collaborator,
        the platform should say "no" automatically, not put the burden on the PI
        to remember.


        (c) matters too, but it's secondary. The real tension is: PIs want
        autonomy, but they also want guardrails so they don't accidentally
        violate IRB restrictions and end up in compliance trouble.


        That's why institutional override is important—it's the safety valve.
        PIs run their labs, but if they're headed toward a violation, we step
        in. Most PIs are fine with that because it protects them as much as it
        protects the institution.
    - id: stakeholder-elaboration-stakeholder_006-0-extraction-r0
      value:
        responseInterpretation: Lab PIs need control over data access decisions (who can
          see their lab's data) combined with automatic compliance checking.
          They want autonomy as data owners, but also want the system to enforce
          consent rules automatically so they don't accidentally violate IRB
          restrictions. Administrative overhead reduction matters but is
          secondary. Institutional override is acceptable to PIs because it
          serves as a safety valve—protecting them from compliance violations
          while preserving their operational autonomy.
        role: Data owners responsible for deciding who accesses their lab's data, with
          accountability for IRB compliance and authorization to share datasets
          with collaborators
        concerns:
          - Need autonomy to decide who can access their lab's data without
            going through multiple approval steps
          - Want system to automatically catch compliance mistakes before they
            happen instead of bearing the burden of remembering IRB restrictions
          - Risk of accidentally violating IRB restrictions and facing
            compliance trouble
          - Administrative overhead from compliance paperwork takes time away
            from running experiments
        contradictions: []
        waitingRoomItems:
          - content: Institutional override is important as a safety valve—PIs run their
