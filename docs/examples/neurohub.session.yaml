    - id: purpose-advantage-0-composition-r0
      value:
        question: What **advantages** would this platform have over how you currently
          store and share brain imaging data?
        suggestions:
          - Centralized access — no more scattered data across lab drives, cloud
            folders, and external hard drives
          - Built-in collaboration tools — researchers can annotate findings and
            discuss results without emailing files back and forth
          - Standardized metadata and processing pipelines — reduces time spent
            reformatting data for analysis
    - id: purpose-advantage-0-question-r0
      value: >-
        Good question. The biggest pain point is **provenance tracking**. Right
        now, when someone derives a result from raw imaging data, we have no
        reliable way to know which pipeline version was used, what parameters
        were set, or which source files produced it. That's a compliance
        nightmare and makes results hard to reproduce.


        Second is **access control at the dataset level**. We've got multiple
        studies with different consent scopes — some allow sharing within the
        institution, others don't allow any sharing. Lab PIs control their own
        data, but we need institutional oversight for compliance. Right now it's
        all ad-hoc.


        Centralized storage helps too, but honestly, that's the easy part. The
        real value is being able to answer "where did this come from?" and
        "who's allowed to see this?" reliably.
    - id: purpose-advantage-0-extraction-r0
      value:
        purpose: null
        advantage: Provenance tracking — reliably determine which pipeline version was
          used, what parameters were set, and which source files produced
          results. Access control at dataset level — enforce institutional
          compliance by controlling who can see data based on consent scopes
          across multiple studies, with institutional oversight rather than
          ad-hoc lab PI control. Centralized storage reduces scattered data
          across lab drives, cloud folders, and external hard drives.
        measurement: null
        responseInterpretation: "The respondent identified provenance tracking and
          dataset-level access control as the platform's primary advantages over
          current practice. They acknowledged that centralized storage
          (suggestion a) is valuable but secondary — the core value is answering
          'where did this come from?' and 'who's allowed to see this?' reliably.
          Current pain points: no way to track which pipeline version,
          parameters, or source files produced derived results (compliance and
          reproducibility issue). Multiple studies with different consent scopes
          require institutional oversight, but current system is ad-hoc with lab
          PIs controlling their own data."
        contradictions: []
        responseClass: answer
    - id: purpose-measurement-0-composition-r0
      value:
        question: What **metrics or signs** would tell you this platform is working well
          for your research?
        suggestions:
          - Time saved per week locating or reconstructing dataset provenance
            instead of emailing collaborators
          - Number of data access requests we can approve/deny automatically
            through compliance rules instead of manual review
          - Reduction in duplicate datasets stored across lab drives and
            external drives after migrating to centralized storage
    - id: purpose-measurement-0-question-r0
      value: >-
        The clearest one is **audit trail completeness**. If a researcher
        publishes a result, we should be able to reconstruct the full
        lineage—raw acquisition → processing pipeline → parameters → final
        dataset—without gaps or guesswork. Right now we can't.


        Second is **compliance speed**. When an IRB request comes in asking "who
        has access to study X's data?" we should answer in minutes, not days of
        manual checking.


        Third is **reduced friction for sharing**. Right now, sharing restricted
        data across labs requires back-and-forth emails and manual permission
        checks. If the platform enforces consent scopes automatically,
        researchers spend less time on compliance overhead and more time on
        science.


        I wouldn't focus too much on storage consolidation—that's nice-to-have.
        The real win is knowing what we have, where it came from, and who's
        allowed to see it.
    - id: purpose-measurement-0-extraction-r0
      value:
