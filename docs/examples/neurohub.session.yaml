    - id: goal-refinement-goal_004-clarify-0-composition-r0
      value:
        question: When you say the platform should integrate with existing workflows,
          what would that look like day-to-day—how would researchers interact
          with it without disrupting how they currently work?
        suggestions:
          - Researchers continue using their current tools (MATLAB, Python
            scripts, file systems) and the platform sits behind the scenes,
            automatically capturing provenance when they run analyses
          - The platform provides optional connectors or APIs so existing lab
            pipelines can log metadata without rewriting code, but teams can opt
            in gradually per project
          - Researchers upload datasets and results through a web interface or
            command-line tool that mirrors folder structures they already use,
            so the learning curve is minimal
    - id: goal-refinement-goal_004-clarify-0-question-r0
      value: >-
        It's mostly (a) with a bit of (b). 


        Researchers keep using their Python scripts and MATLAB code. When they
        submit a job to the HPC cluster, the platform automatically captures
        what ran—which pipeline version, what parameters, which input files. We
        integrate with the HPC job scheduler so provenance tracking happens
        without researchers thinking about it.


        For labs that have custom analysis workflows, we need an API so they can
        log metadata themselves if they want. But that's optional—the default
        case is "run your job on HPC like you always do, and we track it."


        The one place they *do* need to interact with the platform directly is
        when publishing a dataset or checking access permissions. That needs a
        web interface or CLI, but it's rare enough that it doesn't disrupt their
        day-to-day work.
