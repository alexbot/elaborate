    - id: opening-greet-r0
      value: >-
        I appreciate the greeting, but I should clarify my role here. I'm a
        stakeholder being interviewed *about* a neuroscience research data
        management platform — not the person building it. The platform is
        already in motion, and I'm here to discuss how it fits into our research
        workflows and what we need from it.


        What would you like to know about the project or our needs?
    - id: opening-greet-extraction-r0
      value:
        purpose: neuroscience research data management platform
        stakeholders:
          - neuroscience researchers
          - research teams
        domainHints:
          - neuroscience
          - research
          - data management
          - research workflows
        responseClass: answer
    - id: opening-brownfield-screen
      value:
        greenfieldConfidence: 8
        reasoning: User describes a neuroscience research data management platform with
          stakeholder types (researchers, research teams) and domain context,
          but provides no mention of existing codebases, prior versions, legacy
          systems, institutional infrastructure, databases, or artifacts to
          build on or integrate with. The description is purely domain-oriented
          (problem space) rather than artifact-oriented (starting point). High
          confidence this is greenfield, with minor uncertainty reserved for the
          possibility that institutional or departmental infrastructure exists
          but wasn't mentioned.
    - id: opening-summary-r0
      value: Yes, that's right. We need a platform for neuroscience researchers to
        store, share, and analyze brain imaging data—things like fMRI scans,
        electrophysiology recordings, and the datasets we derive from them. The
        tricky part is tracking where everything came from and controlling who
        can access what, especially since we have IRB restrictions on sharing.
