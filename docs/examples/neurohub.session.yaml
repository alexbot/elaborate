    - id: stakeholder-elaboration-stakeholder_001-0-composition-r0
      value:
        question: As someone who works with neuroscience data, what would **provenance
          tracking and consent enforcement** mean for your day-to-day work?
        suggestions:
          - Being able to quickly answer 'where did this result come from'
            without manually digging through lab notebooks or old emails
          - Spending less time checking whether collaborators have consent to
            see a dataset, and more time on actual analysis
          - Having a central place to find datasets instead of asking around or
            checking different lab drives and shared folders
    - id: stakeholder-elaboration-stakeholder_001-0-question-r0
      value: >-
        For me, it's mostly (a) but from a governance angle. When a lab
        publishes a result or shares data outside the institution, I need to
        audit it—verify the consent scope actually allows that sharing, trace
        back to the raw data and pipeline to make sure nothing got corrupted or
        modified after publication.


        Right now that's a manual nightmare. A researcher says "we used study
        X's data," I dig through emails, lab wikis, sometimes call the PI
        directly. With provenance tracking, I pull up the dataset, see exactly
        what consent it has, what pipeline produced it, when it was
        published—all in one place.


        The other piece is **enforcement**. If a dataset has a consent scope
        that prohibits sharing, the platform should block it automatically. Lab
        PIs shouldn't have to remember; the system should make it impossible to
        accidentally violate IRB restrictions.
    - id: stakeholder-elaboration-stakeholder_001-0-extraction-r0
      value:
        responseInterpretation: "Institutional data stewards need provenance tracking
          primarily from a governance and audit angle. When a lab publishes or
          shares data outside the institution, they must verify that consent
          scope permits that sharing and trace back through raw data and
          pipeline to ensure nothing was corrupted or modified after
          publication. Currently this is manual—researchers say they used study
          X's data, and the steward digs through emails, lab wikis, and calls
          PIs directly. With provenance tracking, they pull up a dataset and see
          its consent scope, the pipeline that produced it, and publication date
          in one place. The enforcement piece is critical: if a dataset has a
          consent scope prohibiting sharing, the platform should block it
          automatically rather than relying on lab PIs to remember IRB
          restrictions."
        role: institutional data steward responsible for audit and compliance
          verification when labs publish or share data outside the institution
        concerns:
          - Manual audit process is time-consuming—digging through emails, lab
            wikis, and direct PI calls to verify consent scope for data sharing
          - Need to trace raw data and pipeline to verify nothing was corrupted
            or modified after publication
          - Consent scope violations can happen accidentally because lab PIs
            must remember IRB restrictions
          - No centralized place to quickly verify what consent a dataset has
            and what pipeline produced it
        contradictions: []
        waitingRoomItems: []
        responseClass: answer
