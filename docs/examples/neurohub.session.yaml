    - id: validation-summary-present-r0
      value: >-
        This is comprehensive, but I need to flag the conflicts directly.


        On the **validation finding about goal_001 vs. assumption_002**:
        goal_001 says "complete provenance tracking," but we can't guarantee
        that for local analysis. That's a real tension. Either we narrow
        goal_001 to say "complete for HPC, documented for local," or we accept
        that the goal is aspirational and the platform does its best. I'd say
        narrow goal_001—be honest about what we're guaranteeing.


        On **constraint_001 vs. constraint_003** (10+ year retention vs. storage
        as bottleneck): we're going to have to choose. Either we accept that
        storage costs will grow, or we implement tiering—keep recent versions +
        published versions online, archive older snapshots. I'd lean toward
        tiering with archive access, but that's a design decision, not something
        I can resolve in this conversation.


        On **goal_002 vs. out-of-scope on PI autonomy**: this is the real
        friction. We want automatic compliance enforcement *and* PI control.
        Constraint_005 (steward override) is the answer, but it adds overhead.
        I'm comfortable with that—PIs keep autonomy, stewards have emergency
        override. That's the trade-off. But document it explicitly so there's no
        false promise about "frictionless" sharing when compliance violations
        are involved.


        The documented-or-denied enforcement in scope item 9 isn't a breaking
        conflict with goal_004—it's a reasonable gate. Researchers already
        document their pipelines; we're just making it mandatory in the
        platform. That's not a major workflow change.


        So: fix goal_001 wording, decide on tiering strategy, and make clear
        that "reduced friction" applies to *legitimate* sharing, not sharing
        that violates IRB restrictions. Everything else holds.
