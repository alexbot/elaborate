    - id: stakeholder-elaboration-stakeholder_003-0-composition-r0
      value:
        question: What role would **HPC cluster administrators** play in a system that
          automatically captures provenance when researchers run pipelines on
          your cluster?
        suggestions:
          - They'd need to integrate the system with our job scheduler and
            monitor storage usage without manual intervention.
          - They'd mainly help troubleshoot when provenance capture fails or
            when researchers need help accessing their pipeline history.
          - They'd have little involvement—researchers would handle it
            themselves once the integration is set up.
    - id: stakeholder-elaboration-stakeholder_003-0-question-r0
      value: >-
        It's mostly (a). The HPC admins would need to set up the integration
        with the job scheduler so that when a job runs, metadata gets captured
        automatically—job ID, pipeline version, input files, parameters, output
        location. That's a one-time setup cost.


        After that, they'd probably handle (b)—when provenance capture fails or
        when a researcher has questions about how to query their pipeline
        history. They'd also need to monitor whether the integration is working
        reliably and alert us if it breaks.


        But they're not gatekeepers. Once it's set up, researchers submit jobs
        like normal, and the system captures provenance in the background. The
        HPC admins just need to keep it running.
    - id: stakeholder-elaboration-stakeholder_003-0-extraction-r0
      value:
        responseInterpretation: HPC admins would primarily handle one-time integration
          setup with the job scheduler to capture metadata automatically (job
          ID, pipeline version, input files, parameters, output location). After
          setup, they'd troubleshoot when provenance capture fails and help
