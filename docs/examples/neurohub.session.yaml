    - id: scope-contrast-2-composition-r0
      value:
        question: When researchers bring data from LORIS, file servers, or email—should
          the platform normalize all metadata to a standard structure, or accept
          messy metadata and normalize only what's needed for querying?
        suggestions:
          - Normalize everything to a standard schema upfront—labs must reformat
            their metadata before import
          - Accept metadata as-is and normalize only the fields we query
            (consent scope, pipeline version, dataset name)—labs don't need to
            change their records
          - "Hybrid: require normalization for compliance-critical fields (IRB
            protocol, acquisition date) but accept anything for descriptive
            metadata"
    - id: scope-contrast-2-question-r0
      value: >-
        It's (c). We need **compliance-critical fields normalized**—IRB protocol
        ID, consent scope, acquisition date, dataset version. Those have to be
        structured and queryable because stewards rely on them for audit and
        access control decisions.


        Everything else—lab-specific notes, processing documentation, folder
        naming conventions—we accept as-is. Labs already have inconsistent ways
        of organizing that stuff, and forcing them to reformat is friction we
        don't need.


        So the import process validates and normalizes the critical fields,
        rejects the import if those are missing or malformed, and stores
        everything else as unstructured metadata. Stewards can still search on
        the structured fields without labs having to do heavy lifting to clean
        up their records.
    - id: scope-contrast-2-extraction-r0
      value:
        responseInterpretation: Respondent chose option (c) — hybrid approach.
          Compliance-critical fields (IRB protocol ID, consent scope,
          acquisition date, dataset version) must be normalized to a standard
          structure and are required for import; missing or malformed critical
          fields cause import rejection. All other metadata (lab-specific notes,
          processing documentation, folder naming conventions) is accepted as-is
          and stored unstructured. Import process validates and normalizes
          critical fields; stewards can query on structured fields without
          requiring labs to reformat their existing records.
