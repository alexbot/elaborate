    - id: goal-seed-extraction
      value:
        goals:
          - title: Enable reproducible research through complete provenance tracking
            description: Researchers can reconstruct the full lineage of any published
              result—from raw acquisition through processing pipeline,
              parameters, and final dataset—without gaps or guesswork. This
              creates an auditable record that satisfies publication standards
              and institutional oversight.
            rationale: Provenance gaps undermine scientific credibility and make compliance
              audits manual and slow. Complete lineage is a prerequisite for
              reproducibility, which is a core obligation in neuroscience
              publishing.
          - title: Enforce consent compliance automatically across studies
            description: The platform applies access control at the dataset level, enforcing
              consent scopes across multiple studies automatically. Researchers
              can answer IRB access requests in minutes rather than days of
              manual checking, and institutional oversight replaces ad-hoc lab
              PI decisions.
            rationale: Manual compliance checking is slow, error-prone, and a major friction
              point in sharing. Institutional oversight adds accountability;
              automating it frees researcher time for science and reduces
              compliance risk.
          - title: Create a unified, immutable archive for research data
            description: Centralize scattered data (lab drives, cloud folders, external hard
              drives) into a single platform where published datasets are
              versioned and immutable. Researchers always work with a fixed
              snapshot; changes are tracked but never lost.
            rationale: Data scattered across storage silos is hard to locate, share, or
              audit. Immutability and versioning prevent accidental overwrites
              and give researchers confidence in data stability for long-term
              collaboration and publication.
        drainedWaitingRoomIds: []
    - id: goal-seed-present-r0
      value: >-
        Those three are solid. I'd add one more: **Integrate with existing
        workflows without forcing migration**.


        We've got LORIS already in use by some labs, and the HPC cluster where
        researchers run their analysis pipelines. The new platform needs to work
        *with* those systems, not replace them. Data should be importable from
        LORIS, and analysis results from the HPC cluster should feed back into
        provenance tracking automatically.


        Otherwise, adoption stalls because labs see it as overhead instead of a
        tool that fits how they already work.
