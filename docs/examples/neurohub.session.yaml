    - id: stakeholder-elaboration-stakeholder_002-0-composition-r0
      value:
        question: What does a typical day look like for your team when you're working
          with brain imaging data—from acquisition through analysis to sharing
          results?
        suggestions:
          - We acquire fMRI scans on our scanner, run them through SPM or FSL
            pipelines on the HPC cluster, then manually document parameters in a
            shared lab wiki before sharing results with collaborators.
          - We use custom Python scripts to preprocess electrophysiology
            recordings locally, store intermediate files on our lab drive, and
            email raw datasets to other labs when they ask—tracking consent is
            mostly done through email threads.
          - We pull preprocessed datasets from a shared institutional
            repository, run our own statistical analyses in MATLAB, and version
            results by renaming files; we're not sure what pipelines produced
            the original data.
    - id: stakeholder-elaboration-stakeholder_002-0-question-r0
      value: >-
        I don't run analyses myself—I'm on the governance side. But I can tell
        you what I *see* across labs:


        Some labs use LORIS for clinical imaging, which tracks metadata pretty
        well. Others store raw data on institutional file servers with folder
        structures that only make sense to whoever created them. When
        electrophysiology data gets shared, it's often via email or Dropbox with
        a README file that may or may not be accurate.


        The real problem: when a lab wants to share data—either internally with
        another lab or externally for a publication—I have to manually verify
        consent, trace back to what IRB protocol approved it, sometimes dig into
        old emails to confirm parameters. If the data's been through multiple
        processing steps, I'm guessing at what the source files were.


        That's where the friction is. I'm not the one running analyses. I'm the
        one who has to say "yes, this can be shared" or "no, consent doesn't
        permit that," and I'm doing it with incomplete information and a lot of
        manual work.
