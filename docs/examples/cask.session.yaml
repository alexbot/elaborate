    - id: goal-refinement-goal_004-clarify-0-composition-r0
      value:
        question: When you say **isolate and contain third-party plugins**, what would
          that concretely prevent or protect against?
        suggestions:
          - A plugin's error or crash shouldn't bring down the entire pipeline —
            it fails gracefully and the pipeline can skip it or retry.
          - Plugins can't access data they shouldn't have or modify core
            pipeline configuration without explicit permission.
          - You can run plugins in separate processes or containers so they're
            sandboxed from each other and the host system.
    - id: goal-refinement-goal_004-clarify-0-question-r0
      value: >-
        It's (b) and (c) together. A plugin shouldn't be able to read datasets
        from other teams' pipelines, and it shouldn't be able to consume
        unlimited CPU or memory and starve legitimate work. Separate processes
        with resource caps handle the memory/CPU part. Access controls handle
        the data isolation.


        (a) is nice to have but secondary — if a plugin crashes, the pipeline
        fails. That's expected. But it shouldn't take the whole platform down or
        leak data to the wrong team.
    - id: goal-refinement-goal_004-clarify-0-extraction-r0
      value:
        responseInterpretation: "Isolation and containment means two things working
          together: (1) Access controls so plugins can't read datasets from
          other teams' pipelines, and (2) Separate processes with resource caps
          so a plugin can't consume unlimited CPU or memory and starve
          legitimate work. Plugin crashes are acceptable and expected — the
          pipeline fails at that step. But a plugin crash shouldn't take the
          whole platform down or leak data to the wrong team."
        title: null
        description: Plugins run in separate processes with resource limits (CPU/memory
          caps) and access controls that prevent cross-team data access and core
          pipeline configuration modification without explicit permission.
        rationale: Prevents data leakage between teams and resource exhaustion attacks;
          isolates failure scope so a plugin failure doesn't compromise the
          platform or expose confidential datasets.
