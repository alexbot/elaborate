    - id: goals-confirmation-r0
      value: >-
        Looks good. One more goal though — datasets need schema versioning so a
        pipeline built against v2 of a schema doesn't break when v3 comes out.
        Right now that's a silent killer. You publish a new schema version and
        suddenly half your pipelines are broken without anyone knowing why.


        So maybe: **Support schema evolution without breaking existing
        pipelines** — Datasets are versioned independently. A pipeline pins to a
        specific schema version and keeps working even after newer versions are
        published.


        _Why it matters:_ Teams can evolve data models without coordinating
        across every pipeline that depends on them. Avoids the brittleness of
        tightly coupled schemas.
