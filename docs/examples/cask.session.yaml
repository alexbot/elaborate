    - id: goal-seed-present-r0
      value: >-
        Those three are solid. I'd keep all of them.


        One thing missing though: the plugin system only works if bad plugins
        don't take down the platform. Plugins run in sandboxed environments with
        resource limits — CPU, memory, that kind of thing. Otherwise one team's
        runaway transformer could starve the whole system.


        So maybe add a goal around **plugin isolation and safety** — something
        like "Third-party plugins can't compromise platform stability or steal
        data from other teams' pipelines."
