    - id: opening-greet-r0
      value: >-
        I appreciate the setup, but I need to be direct: I'm playing a
        stakeholder being interviewed *about* a data platform project that
        already exists — not scoping a new project with Eli.


        The project is: a data application platform for developers to build,
        deploy, and manage data pipelines. It has dataset types, pipeline
        orchestration, a hydrator for ingestion, and a plugin architecture.


        I'm ready to answer questions about it — what would you like to know?
