    - id: purpose-measurement-0-composition-r0
      value:
        question: How would you know if this tool made your **pipeline work** faster or
          easier?
        suggestions:
          - Time to assemble and run a new pipeline drops from hours to minutes
          - We spend less time debugging failed steps because error messages
            tell us exactly what went wrong
          - Adding a new data source no longer means modifying core code — just
            plugging in a connector
    - id: purpose-measurement-0-question-r0
      value: >-
        Time to first working pipeline is the obvious one — if it goes from
        hours to minutes, you've won. That's (a).


        But I think (b) is where we'd actually see adoption stick. Developers
        hate black boxes. If a pipeline fails and the error message is vague,
        they bail and write their own thing. If we show them exactly which step
        failed, what the inputs were, and why the transformation rejected it —
        that builds confidence.


        (c) matters for extensibility, but that's more about not blocking teams
        down the line than an immediate win.
