name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build (tsc)
        run: npm run build

      - name: Build skill bundle
        run: npm run build:skill

      - name: Verify skill bundle is up to date
        run: |
          if ! git diff --quiet skills/; then
            echo "::error::skills/ directory is out of date. Run 'npm run build:skill' and commit the result."
            git diff --stat skills/
            exit 1
          fi

      - name: Test
        run: npm run test:run

      - name: Lint
        run: npm run lint
