name: Bug report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for reporting a bug.
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal steps to trigger the bug.
      placeholder: |
        1. Run the skill with ...
        2. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: node-version
    attributes:
      label: Node version
      placeholder: "e.g. 22.4.0"
    validations:
      required: true
  - type: input
    id: claude-version
    attributes:
      label: Claude Code version (if applicable)
      placeholder: "e.g. 1.2.3"
    validations:
      required: false
